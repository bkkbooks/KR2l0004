body:
  text: 翰苑羣書卷二宋洪遵編元稹承㫖學士院記舊制學士無得以承㫖為名者應對顧問旅次班第以官為上下憲宗章武孝皇帝以永貞元年即大位始命鄭公絪為承㫖學士位在諸學士上居在東第一閤乗輿奉郊廟輒得乗廐馬自浴殿由内朝以從掲雞竿布大澤則升丹鳳之西南隅外賓客進見於麟徳則止直禁中以俟凡大誥令大廢置丞相之密畫内外之密奏上之所甚注意者莫不専受專對他人無得而參非自異也法不當言用是十七年之間由鄭至杜十一人而九參天政其不至者衞公詔及門而返事適然也禁省中備傳其事至於張則弄相印以俟其病間者久之卒不興命也已若此則安可以昩陋不肖之稹繼居九丞相二名卿之後乎俛仰瞻睹如遭大賓每自誨其心曰以若之不俊不明而又使欲惡欹曲攻於内且决事於㝠㝠之中無暴揚報效之慮遂忿行私易也然而隂潛之神必有記善惡之餘者以君父之遇若如是而猶舉枉措直可乎哉使若之心忽而為他人盡數若之所為而終不自愧乃可矣昔魯恭王餘畫先賢於屋壁以自警臨我以十一賢之名氏豈直自警哉由是謹其遷授書於座隅長慶元年八月十日記鄭絪貞元二十一年二月自司勲員外郎翰林學士拜中書舍人賜紫金魚袋充其年十月二十七日拜中書侍郎同中書門下平章事集賢殿大學士李吉甫永貞元年十二月二十四日自考功郎中知制誥入院二十七日正除仍賜紫金魚袋充元和元年加銀青光禄大夫二年正月二十一日拜中書侍郎同中書門下平章事裴垍元和二年四月十六日自考功郎中知制誥翰林學士賜紫金魚袋拜中書舍人充三年四月二十五日出院拜户部侍郎其年冬拜中書侍郎平章事衞次公元和三年六月二十五日以兵部侍郎入院充七月二十三日加知制誥四年三月改太子賓客出院後拜淮南節度使李絳元和四年四月十七日自主客員外郎翰林學士拜司勲員外郎知制誥充五月十九日賜紫金魚袋五年五月五日遷司勲郎中知制誥十二月正除六年二月二十七日出院拜户部侍郎其年十月拜中書侍郎平章事崔羣元和六年二月四日以庫部郎中知制誥翰林學士賜緋魚袋充七年四月二十九日正除九年六月二十六日出院拜户部侍郎十二月拜中書侍郎平章事王涯元和十一年正月十八日以中書舍人入院充二十四日賜紫金魚袋十月十七日拜工部侍郎知制誥十二月十九日拜中書侍郎同中書門下平章事令狐楚元和十二年二月二十四日以職方郎中知制誥翰林學士賜緋魚袋充三月二十日正除八月四日出守本官後自河陽節度拜中書侍郎平章事張仲素元和十三年二月十八日以司封郎中知制誥翰林學士仍賜紫金魚袋十四年三月二十八日正除其年卒官贈禮部侍郎段文昌元和十五年閏正月一日以中書舍人翰林學士與杜元穎同承㫖仍賜紫金魚袋八月拜中書侍郎同中書門下平章事杜元穎元和十五年閏正月一日以司勲員外郎翰林學士充賜紫金魚袋二十一日正除十一月十七日拜户部侍郎知制誥長慶元年二月十五日以本官同中書門下平章事元稹長慶元年二月十六日自祠部郎中知制誥行中書舍人翰林學士仍賜紫金魚袋其年十月十九日拜工部侍郎出院二年二月拜本官平章事李徳裕長慶元年正月二十九日以考功郎中知制誥翰林學士賜緋魚袋二月四日遷中書舍人充餘如故十九日改御史中丞出院李紳長慶二年二月十九日自司勲員外郎知制誥翰林學士賜緋魚袋遷中書舍人充二十三日賜紫金魚袋三年三月二十七日改御史中丞出院韋處厚長慶四年二月十三日以侍講學士權知兵部侍郎知制誥賜紫金魚袋為翰林學士充十月十四日正拜兵部侍郎餘如故寶厯元年十二月十七日拜中書侍郎平章事翰苑羣書卷二
