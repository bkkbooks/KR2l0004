body:
  text: 翰苑羣書卷六宋洪遵編丁居晦重修承㫖學士壁記尚書元稹承㫖學士㕔記舊題在東廡之右嵗月滋久日爍雨潤牆屋罅缺文字昩没不稱深嚴之地院使郭公王公皆以茂器精識參掌院事顧是言曰吾儕釐務罄盡心力細大之事人謂無遺而兹獨未暇使衆賢名氏翳不光耀失之不治後誰治之遂占工賦程不日而成峭學乎粉繪耀明玉粹雲輕隨顧而生貫列豪英千千萬齡無缺無傾工告休命予紀完葺之美舊記所載今皆不書開成表號之二年五月十四日記學士姓名此夲據院中壁上寫並無大厯天寶學士姓名開元後八人吕向中書舍人充供奉出院拜工部侍郎尹愔諫議大夫充劉光謙起居舍人充累遷司封郎中張垍太常卿充張淑給事中充張漸中書舍人充竇華中書舍人充裴士淹給事中充知制誥至徳後四人相董晉祕書省校書郎充于可封補闕充􅁶禮部員外郎知制誥除國子司業出院蘇源明中書舍人充出守本官潘炎右驍衞兵曺充累遷中書舍人出守本官寶應後六人相常衮右補闕充累加工部員外郎知制誥出守本官栁伉祕書省校書郎充累加太常愽士諫議大夫依前充張涉靖陵太子廟丞充累遷左散騎常侍依前充敕停李翰左補闕充于肅比部員外郎充累遷考功郎中給事中知制誥並依前充于益建中後八人張周大厯十四年六月自洛陽縣尉充建中二年改河南府兵曺參軍興元二年六月除虢州司馬依前充相姜公輔建中元年自左拾遺充四年四月改京兆府户曺參軍拜諫議大夫平章事相趙宗儒建中元年自左拾遺充四年加屯田員外郎依前充十一月出守本官歸崇敬建中元年自國子司業充四年遷左散騎常侍貞元七年六月除檢校户部尚書兼本官七月遷正工部尚書依前充八年除兵部尚書致仕相陸贄建中四年三月自祠部員外郎充其年十一月轉考功郎中興元二年六月遷諫議大夫十二月轉中書舍人貞元三年丁憂六年遷兵部侍郎又加知制誥七年出守本官吴通㣲建中四年自金部郎中充累遷中書舍人賜紫金魚袋卒官吴通𤣥建中四年自侍御史充累遷起居舍人諫議大夫賜紫金魚袋顧少連建中四年自水部員外郎充貞元四年二月加知制誥七年遷中書舍人八年四月改户部侍郎賜紫金魚袋出院興元後二人奚陟興元元年自起居郎充病免吉中孚興元元年自司封郎中知制誥充六月改諫議大夫貞元二年遷户部侍郎出院貞元後十二人相韋執誼貞元元年自左拾遺充二月加知制誥賜緋魚袋遷起居舍人丁憂梁肅貞元七年自左補闕充兼皇太子侍讀守本官兼史館修撰韋綬貞元七年自左補闕充十六年十月丁憂相鄭絪貞元八年自司勲員外郎知制誥充五月賜緋魚袋二十一年二月二十二日遷中書舍人賜紫金魚袋十二月拜中書侍郎平章事相鄭餘慶貞元八年四月二十四日自庫部員外郎充十三年五月二十八日遷工部侍郎知吏部選事衞次公貞元八年四月二十日自左補闕充二十一年二月二十二日加司勲員外郎賜緋魚袋三月十七日知制誥元和三年正月權知中書舍人出院相李程貞元二十年九月二十七日自監察御史充二十一年三月十七日加水部員外郎元和元年九月加朝散大夫賜緋魚袋二年四月二十一日轉司勲員外郎二年七月二十三日知制誥其年出院授隨州刺史張聿貞元二十年九月二十七日自祕書省正字充二十一年三月十七日遷左拾遺元和元年十一月加朝散大夫賜緋魚袋二年正月出守本官李建貞元二年十二月二十二日自祕書省校書郎充二十一年三月十七日遷左拾遺改詹事府司直凌凖貞元二十一年正月六日自侍御史充三月十七日改都官員外郎五月九日出守本官判度支王叔文貞元二十一年二月二十二日自起居舍人充三月十六日以本官加度支鹽鐵轉運副依前充五月二十四日遷戸部侍郎餘依前丁憂貶渝州司戸參軍王伾貞元二十一年二月二日自散騎常侍充貶開州司户永貞後二人相李吉甫永貞元年十二月二十四日自考功郎中知制誥充二十七日遷中書舍人賜紫金魚袋元和元年十二月加銀青二年正月二十一日拜中書侍郎平章事相裴垍永貞元年十二月二十五日自考功員外郎充二十七日遷考功郎中知制誥賜緋魚袋元和元年十一月加朝散大夫賜紫二年四月十六日遷中書舍人三年四月二十五日出院拜户部侍郎元和後二十四人相李絳元和二年四月八日自監察御史充加主客員外郎四年四月十七日加司勲員外郎知制誥五月十九日賜緋五年五月五日加司勲郎中依前充十一日遷中書舍人賜紫六年二月二十七日出院拜户部侍郎相崔羣元和二年十一月六日自左補闕充三年四月二十八日加庫部員外郎五月五日加庫部郎中知制誥十二月賜緋七年四月二十九日遷中書舍人九年六月二十六日出院拜禮部侍郎白居易元和二年十一月六日自盩厔縣尉充三年四月二十八日遷左拾遺五年五月五日改京兆府户曺參軍依前充丁憂衞次公元和三年六月二十五日自權知兵部侍郎充七月二十三日加知制誥四年三月出院除太子賓客錢徽元和三年八月二十六日自祠部員外郎充六年四月二十五日加本司郎中八年五月九日轉司封郎中知制誥十一月賜緋十年七月二十三日遷中書舍人十一年出守本官韋𢎞景元和四年七月一日自左拾遺集賢院直學士充九月轉左補闕七年二月五日遷司門員外郎八年十月二十日出守本官獨孤郁元和五年四月一日自右補闕史館修撰改起居郎充九月出守本官相蕭俛元和六年四月十二日自右補闕充七年八月五日加司封員外郎九年十一月二十四日加駕部郎中十二月十日加知制誥十二日賜緋劉從周元和八年七月二十七日自左補闕充卒獨孤郁元和八年十二月二十二日自駕部郎中知制誥充病免改秘書少監徐晦元和九年七月二十三日自東都留守判官都官員外郎充十年七月二十三日轉司封郎中十二年二月十一日出守本官相令狐楚元和九年七月二十五日自職方員外郎知制誥充十二月十一日賜緋十一月七日轉本司郎中十二年三月遷中書舍人八月四日出守本官郭求元和十一年十一月六日自藍田尉史館修撰充八月遷左拾遺十一月八日出守本官張仲素元和十一年八月十五日自禮部郎中充十三年正月十二日加司封郎中知制誥二月十八日賜紫十四年三月二十八日遷中書舍人卒官贈禮部侍郎相段文昌元和十一年八月十五日自祠部員外郎充十三年正月十二日加本司郎中二月十八日賜緋十四年四月加知制誥十五年正月二十三日遷中書舍人閏正月一日賜紫八日拜中書侍郎平章事沈傳師元和十一年二月十三日自左補闕史館修撰充十三年正月十三日遷司門員外郎二月十八日賜緋十五年正月二十三日加司勲郎中閏正月一日賜紫二十一日加兵部郎中知制誥長慶元年二月二十四日遷中書舍人二月十九日出守本官判史館事相杜元穎元和十二年闕月十三日自太常博士充二十日改右補闕闕月十八日賜緋十四年三月二十一日加司勲員外郎十五年閏正月一日賜紫二十一日遷中書舍人十一月十七日遷户部侍郎知制誥長慶元年二月十五日以本官拜平章事李肇元和十三年七月十六日自監察御史充十四年四月五日遷右補闕九月二十四日賜緋十五年閏正月一日賜紫二十一日加司勲員外郎長慶元年正月十三日出守本官相李徳裕元和十五年閏正月十三日自監察御史充二月一日賜紫二十日加屯田員外郎長慶元年三月二十三日改考功郎中知制誥二年正月二十九日加承㫖二月四日遷中書舍人十九日改御史中丞出院相李紳元和十五年閏正月十三日自右拾遺内供奉充二月一日賜緋二十日遷右補闕長慶元年三月二十三日加司勲員外郎知制誥二年二月十九日遷中書舍人承㫖二十五日賜紫三月二十七日改中丞出院庾敬休元和十五年閏正月十三日自禮部員外郎充二月一日賜緋二十一日加左司郎中長慶元年十月二十一日出守本官相韋處厚元和十五年二月二十四日自户部郎中知制誥充侍講學士三月十日賜緋二十二日遷中書舍人長慶二年五月六日賜紫閏十月八日加史館修撰三年十月二十三日權兵部侍郎知制誥依前侍講學士兼史館修撰四年十月二十三日加承㫖十月十四日正拜兵部侍郎寶厯二年十二月十七日拜中書侍郎平章事相路隋元和十五年二月二十四日自司勲員外郎史館修撰充侍讀學士三月十日賜緋二十二日轉本司郎中長慶二年五月四日遷諫議大夫閏十月八日加史館修撰四年四月十四日改充學士五月二十四日賜紫二十七日拜中書舍人寶厯二年正月八日遷兵部侍郎知制誥太和二年二月二十七日拜中書侍郎平章事栁公權元和十五年三月二十三日自夏州觀察判官試太常寺恊律郎拜右拾遺賜緋充侍書學士長慶二年九月改右補闕四年出守本官長慶後七人相元稹長慶元年二月十六日自祠部郎中知制誥充仍賜紫十七自拜中書舍人十月遷工部侍郎出院髙釴長慶元年十一月八日自起居郎史館修撰充二十八日賜緋二年五月三日加兵部郎中三年十一月十七日遷户部郎中知制誥四年五月二十四日賜紫十二月十二日拜中書舍人寶厯二年三月四日出守本官蒋防長慶元年十一月十六日自右補闕充二十八日賜緋二年十月九日加司封員外郎三年三月一日加知制誥四年二月六日貶汀州刺史韋表㣲長慶二年二月二日自監察御史充四日賜緋五月三日遷右補闕内供奉三年九月三十日拜庫部員外郎四年五月二十四日賜紫二十七日加知制誥寶厯元年五月二十五日拜中書舍人二年正月遷户部侍郎知制誥大和二年二月二十八日加承㫖三年八月二十日以疾出守本官龎嚴長慶二年三月二日自左拾遺充四日賜緋十月九日遷左補闕三年三月一日加知制誥十月十四日賜紫十一月九日拜駕部郎中知制誥四年二月六日貶信州刺史崔郾長慶四年六月七日自給事中侍講學士十二月十一日改中書舍人寶厯二年九月四日出守本官髙重長慶四年六月四日自司門郎中充侍講學士十二月十一日遷諫議大夫寶厯二年正月六日改給事中出守本官寶厯後二人王源中寶厯元年九月二十四日自户部郎中充十一月二十八日賜紫二年正月二十八日權知中書舍人大和二年二月五日正拜十一月五日遷户部侍郎知制誥十二月加承㫖八年四月出院相宋申錫寶厯元年九月二十四日自禮部員外郎充侍講學士十一月二十八日賜紫十二月十九日改充學士二年正月八日遷户部郎中知制誥大和三年六月一日遷中書舍人四年七月七日遷尚書右丞出院大和後二十人鄭澣大和元年四月二十三日自中書舍人充侍講學士二十八日賜紫二年六月一日遷禮部侍郎出院許康佐大和元年四月二十三日自度支郎中改駕部郎中充侍講學士其月二十八日賜紫二年六月一日遷諫議大夫三年八月二十三日改充學士四年八月二十七日改中書舍人充侍講學士兼侍講七年七月二十五日改户部侍郎知制誥八年五月八日加承㫖九年五月五日改兵部侍郎出院相李讓夷大和元年十二月二十二日自左拾遺改史館修撰六月二十七日賜緋二年二月五日遷左補闕三年十一月五日加職方員外郎五年九月十六日守