body:
  text: 翰苑羣書目錄職官類一官制之屬卷一李肇翰林志卷二元稹承㫖學士院記卷三韋處厚翰林學士記卷四韋執誼翰林院故事卷五楊鉅翰林學士院舊規卷六丁居晦重修承㫖學士壁記卷七李昉禁林讌㑹集卷八蘇易簡續翰林志卷九蘇耆次續翰林志卷十學士年表卷十一翰苑題名卷十二翰苑遺事臣等謹案翰苑羣書十二卷宋學士承㫖洪遵編後有乾道九年遵題記陳振孫書錄解題曰自李肇而下十一家及年表中興後題名共為一書此本所載為李肇翰林志元稹承㫖學士院記韋處厚翰林學士記韋執誼翰林院故事楊鉅翰林學士院舊規丁居晦重修承㫖學士壁記李昉禁林宴㑹集蘇易簡續翰林志蘇耆次續翰林志學士年表翰苑題名翰苑遺事凡十二種其遺事為遵所續年表題名之外所收不過九家與振孫所記不合案文獻通考所載尚有唐張著翰林盛事宋李宗諤翰苑襍記若合此二家正足十一家之數殆原本有之而今佚也其書於厯代翰林典故頗為詳贍足資考覆錄之以備職官類之一種焉乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8443ae8820bd9f4035a420a1b0b833497a064da01203870c3ff12d1f04820c29
