body:
  text: 翰苑羣書卷十二宋洪遵編翰苑遺事淳化二年閏二月命翰林學士賈黄中蘇易簡同勾當差遣院李沆同判吏部流内銓學士領外司自此始也是年十一月二十三日詔定降麻事例宰臣樞密使使相節度使特恩加官除授學士事例銀百兩衣著百疋覃恩加食邑起復落起復銀五十兩衣著五十疋親王以有宣賜事例更不重定公主未出降依親王例宣賜已出降令駙馬都尉管送大中祥符三年閏二月學士晁迥言今月十八日宰臣召臣等問所降徳音不鎖院之故按本院舊例赦書徳音不曽鎖院臣等商議除南郊赦書縁車駕齋宿在外並是預先進入降付中書難以鎖院外自餘赦書徳音今後並依降麻例鎖院從之六年八月學士院諮報凖詔議定書詔用紙今定文武官待制大卿監觀察使以上用白詔紙三司副使閤門使少卿監刺史以上用黄詔紙自餘非巡幸大禮敕書敕榜外並用黄表紙從之右四事國朝㑹要八年四月二日兩制賜御筵於學士院直館及朝臣於史館以考校畢也錢文僖玉堂逢辰録百司申中書皆用状惟學士院用諮報其實如劄子亦不出名但當直學士一人押字而已謂之諮報今俗謂草書名為押字也此唐學士院舊規也唐世學士院故事近時隳廢殆盡惟此一事在爾徃時學士循唐故事見宰相不具靴笏繫鞋坐玉堂上遣院吏計會堂頭直省官學士将至宰相出迎近時學士始具靴笏至中書與常參官雜坐於客位有移時不得見者學士日益自卑丞相禮亦漸薄並習見已久恬然不復怪也嘉祐二年樞密使田公况罷為尚書右丞觀文殿學士兼翰林侍讀學士罷樞密使當降麻而止以制除盖徃時髙若訥罷樞密使所除官職正與田公同亦不降麻遂以為故事真宗時丁晉公謂自平江軍節度使除兵部尚書參知政事節度使當降麻而朝議惜之遂止以制除近者陳相執中罷使相除僕射降麻龐籍罷節度使除觀文殿學士又不降麻盖無定制也仁宗初立今上為皇子令中書召學士草詔學士王珪當直召至中書諭之王曰此大事也必須面奉聖㫖於是求對明日面稟得㫖乃草詔羣公皆以王為真得學士體也端明殿學士五代後唐時置國朝尤以為貴多以翰林學士兼之其不以翰苑兼職及換職者百年間纔兩人特拜程戡王素是也王元之在翰林嘗草夏州李繼遷制繼遷送潤筆物數倍於常然用啓頭書送拒而不納盖惜事體也近時舍人院草制有送潤筆物稍後時者必遣院子詣門催索而當送者徃徃不送相承既久今索者送者皆恬然不以為怪也右十一事歐公歸田録臣伏見國家承五代之餘建萬世之業誅滅僭亂懐来四夷封祀天地制作禮樂至於大臣進退政令改更學士所作文書皆繫朝廷大事示於後世則為王者之訓謨藏之有司乃是本朝之故實自明道已来文書草藁尚有編録景祐以後漸成散失臣曽試令類聚收拾補綴十已失其五六使聖宋之盛文章詔令廢失湮淪緩急事有質疑有司無所檢證盖由從前雖有編録亦無類例卷第祇是本院書吏私自抄寫所以易為廢失今欲乞将國朝以来學士所撰文書各以門類依其年次編成卷帙號為學士院草録有不足者更加求訪補足之仍乞差本院學士從下兩員專切管勾自今已後接續編聨如本行人吏不畫時編録致有漏落許令本院舉察理為過犯此臣本院常事也所以上煩聖聽者盖以近嵗以来百司綱紀相承廢壊事有曽經奏聞及有聖㫖指揮者僅能遵守若祇是本司臨時處置其主判之官纔罷去則其事尋亦廢停所以止欲乞朝廷特降指揮所貴久逺遵行不敢廢失六一居士集唐制翰林學士本職在官下五代趙鳯為之始諷宰相任圜移在官上按趙鳯升學士於官上乃端明殿也唐翰林院在銀臺之北乾封以後劉禕之元萬頃之徒時宣召草制其間因名北門學士今學士院在樞密院之後腹背相倚不可南向故以其西廊西向為院之正門而後門北向與集英相直因牓曰北門兩省樞密院皆無後門惟學士院有之學士退朝入院與禁中宣命徃来皆行北門而正門行者無幾不特取其便事亦以存故事也唐翰林院本内供奉藝能伎術雜居之所以詞臣侍書詔其間乃藝能之一爾開元以前猶未有學士之稱或曰翰林待詔或曰翰林供奉如李太白猶稱供奉自張垍為學士始别建學士院於翰林院之南則與翰林院分而為二然猶冒翰林之名盖唐有𢎞文館學士麗正殿學士故此特以翰林别之其後以名官訖不可改然院名至今但云學士而不冠以翰林則亦自唐以来沿習之舊也唐翰林學士結銜或在官上或在官下無定制予家藏唐碑多如大和中李藏用碑撰者言中散大夫守尚書户部侍郎知制誥翰林學士王源中之類則在官下大中中王巨鏞碑撰者言翰林學士中散大夫守中書舍人劉瑑之類則在官上瑑仍不稱知制誥殊不可曉按劉瑑不稱知制誥唐以来至國朝熈寧官至中書舍人則不帯三字俗稱翰林學士為坡盖唐徳宗時嘗移學士院於金鑾坡上故亦稱鑾坡唐制學士院無常處駕在大内則置於明福門在興慶宫則置於金明門不專在翰林院也然明福金明不以為稱不常居之爾諫議大夫亦稱坡此乃出唐人之語諫議大夫班本在給舍上其遷轉則諫議嵗滿方遷給事中自給事遷舍人當時語云饒道升上坡去亦須却下坡来以諫議為上坡故因以為稱見李文正所記學士院舊制自侍郎以上辭免除授則賜詔皆留其章中書而尚書省略其事因降劄于下院使為詔而已自執政而下至於節度使使相則用批答批答之制更不由中書直禁中封所上章付院令降批答院中即更用紙連其章後書辭併其章賜之此其異也辭既與章相連後書省表具之字必長作表字傍一撇通其章階位上過謂之抹階若使不復用舊銜之意相習已久莫知始何時舊制學士以上賜御仙花帶而不佩魚雖翰林亦然惟二府服笏頭帶佩魚謂之重金元豐官制行始詔六曺尚書翰林學士皆得佩魚故蘇子瞻謝翰林學士表云玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥玉堂之署四字太宗飛白書淳化中以賜蘇易簡蘇參政易簡登科時宋尚書白為南省主文後七年宋為翰林學士承㫖而蘇相繼入院同為學士宋嘗贈詩云昔日曽為尺木階今朝真是青雲友歐陽文忠亦王禹玉南省主文相距十六年同為學士故歐公詩有喜君新賜黄金帶顧我今為白髪翁之句二事誠一時文物之盛也學士院正㕔曰玉堂盖道家之名初李肇翰林志言居翰苑者皆謂淩玉清遡紫霄豈止於登瀛洲哉亦曰登玉堂焉自是遂以玉堂為學士院之稱而不為牓太宗時蘇易簡為學士上嘗語曰玉堂之設但虚傳之說終未有正名乃以紅羅飛白玉堂之署四字賜之易簡即扃鐍置堂上每學士上事始得一開視最為翰林盛事紹聖間蔡魯公為承㫖始奏乞摹就杭州刻牓掲之以避英廟諱去二字止曰玉堂云韓門下維以賜出身熈寧末特除翰林學士崇寧中林彦振賜出身用韓例亦除翰林學士國朝以来學士不由科第除者惟此二人按韓省試中以父億執政不就廷試後為館職以至兩制未嘗賜第也唐詔令雖一出於學士遇有邊防機要大事學士不能盡知者則多宰相以處分之要者自為之辭而付院使増其首尾常式之言謂之詔意今猶見於李徳裕鄭畋集近嵗或出於宰相進呈訖但召待詔即私第書寫或詔學士宰相面授意退而具草然不能無改定也右十一事石林燕語舊學士院在樞密院之後其南廡與密院後廊中分門乃西向玉堂本以待乗輿行幸非學士所得常居惟禮上之日略坐其東受院吏參謁其後為主廊北出直集英殿則所謂北門也學士僅有直舍分於門之兩旁毎鎖院受詔與中使坐主廊余為學士時始請闢兩直舍各分其一間與北門通為三以照壁限其中屏間命待詔鮑詢畫花竹於上與玉堂郭熈春江晚景屏相配當時以為美談後聞王丞相将明為承㫖旁取西省右正言㕔以廣之中為殿曰右文予從叔祖司空道卿慶厯中為翰林學士仁宗欲大用會宋元憲為相同年厚善或以為言乃與元憲俱罷然仁宗欲用之意未衰也再入為三司使而陳恭公尤不喜適以憂去免喪不召就除知澶州吾大觀中亦忝入翰林因曲謝略敘陳太上皇喜曰前此兄弟同時迭為學士者有矣未有宗族相繼於數世之後不惟朝廷得人亦可為卿一門盛事吾頓首謝唐制詔敕號令皆中書舍人之職定員六人以其一人為知制誥以掌進畫翰林學士初但為文辭不專詔命自校書郎以上皆得為之班次各視其官亦無定員故學士入皆試五題麻詔敕詩賦而舍人不試盖舍人乃其本職且多自學士遷也學士未滿一年猶未得為知制誥不與為文嵗滿遷知制誥然後始並直本朝既重學士之選率自知制誥遷故不試而知制誥始亦循唐制不試雍熈初太宗以李文正公沆及来湜王化基為之化基上章辭不能乃使中書並召試制誥二首遂為故事其後梁周翰薛映梁鼎亦或不試而用歐陽文忠公記惟公與楊文公陳文恵公三人者誤也太宗敦奨儒術初除張參政洎錢樞密若水為翰林學士喜以為得人諭輔臣云學士清切之職朕恨不得為之唐故事學士禮上例弄獼猴戱不知何意國初久廢不講至是乃使敕設日舉行而易以教坊雜手伎後遂以為例而余為學士時但移開封府呼市人教坊不復用矣既在禁中亦不敢多致但以一二伎充數爾大觀末余奉詔重修翰林志嘗備録本末會余罷書不克成右四事葉夢得避暑録話謝克家除翰苑以祖諱辭有㫖銜内權不繫三字謝以不帶三字止同職名不可赴院供職又固辭熈寧初韓子華拜相其弟持國在翰苑神宗前期諭令草制注意厚矣持國懇辭弟兄之嫌得請元符末曽子宣爰立其弟子開直北門徽廟特命草麻盖示眷寵也右二事謝伋四六談麈學士及舍人院最重題名學士及舍人赴職之日本院設具應佗學士給諫丞郎待制皆預會以是日題名於石玉冊官刋字後有拜宰相者即其名下刋相字其家遣子弟齎宴具就本院召學士待制以上皆集最為盛禮自元豐行官制之後一切廢罷矣劉子儀在南陽以翰林學士召中途改成都彌年又召為學士至西京復加兩學士知鄭州謝表云仙山已到屢為風引而還長安甚遥豈覺日邊之近故事皇子出閣以翰林學士一員掌牋表南豐先生以中書舍人掌延安郡王牋表出於一時之選也右三事曽紆南遊記舊國朝因仍舊制翰林學士分日遞直夜入宿以備著撰日再而更遇鏁院不前聞日晏禁中連遣走𨽻家召至則皇城門将閉矣少頃御藥入院以客禮見探懐出御封屏吏啓緘即詞頭也御藥取燭視扃鑰退就西閤宿學士歸直舍草制未五鼓院吏書待詔持紙筆立户外學士據案授藁吏細書奏本待詔用麻紙大書乃付門下省庭宣者學士臨視㸃勘匱封以授御藥御藥啓扃持入禁中院吏復扃至朝退然後開院率以為常若遇命相則禁中别設綵殿召學士由内東門入繫鞋立墀下上御小帽窄衫束帶御座側獨設一繡墩少東置杌陳筆硯其上侍衞者皆下學士升殿造膝受㫖趍杌書所得除目進呈置袖中侍衞者皆上乃宣坐賜茶已復庭謝御藥押送入院鏁宿如常制臣近自禮部尚書入為翰林學士八月二十一日晚被召至綵殿獲覩盛儀如前所云有㫖除唐恪少宰罷徐處仁吴敏相上既授㫖復從容語時事久之是日復除順徳帝姬一夕凡四制翊日入侍經筵上曰詞頗逮意既退遣中使至玉堂賜臣筆硯等十三事皆當日殿中所設上所常御者紫青石方硯一琴光螺鈿匣一宣和殿墨二斑竹筆二金筆格一塗金鎮紙天禄二塗金硯水蝦蟆一貯黏麴塗金方匳一鎮紙象尺二薦硯以紫帕匣以黄方啓封時硯漬墨未乾匳中餘麴猶存顧惟韋布書生幸以詞命為職乃被賜人主所御筆硯則知翰苑職親地近非佗要官比如臣鄙陋豈所宜䝉哉異時當草命相制間有被此賜者雖故事實異恩且詞臣之極榮也臣既什襲寶藏以傳子孫因記其事以補翰林志缺文焉昔錢思公嘗謂朝廷之官雖宰相之重皆可雜以佗才處之惟翰林學士非文章不可當時頗以此語取怒於人歐陽文忠公自作内制集序猶以斯言為愧末乃云亦以誇於田夫野老而已然則臣之所以記此者亦将以為田野之美談耳靖康元年十月望日記王㝢玉堂賜筆硯記先生與僕論官制因言及玉堂故事先生曰且如玉堂兩字人多不解太宗皇帝嘗飛白題翰林學士院曰玉堂之署盖此四字出於李尋傳且玉堂殿名也而待詔者有直廬在其側李尋時待詔黄門故曰久汙玉堂之署至英廟嗣位乃徹去及元豐中有翰林學士上言乞摘去二字復榜院門以為臣下光寵詔可是乞以殿名名其院也不遜甚矣僕退而檢漢書盖漢之待詔者或在公車或在金馬門或在官者廬或在黄門時李尋待詔黄門哀帝使侍中徃問災異對曰臣尋位卑術淺過隨衆賢待詔食太官衣御府久汙玉堂之署師古曰玉堂殿在未央宫然制度不見其詳獨翼奉傳略載之奉嘗上疏曰漢徳隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宫館也未央宫又無髙門武臺麒麟鳳凰白虎玉堂金華之殿獨有前殿曲臺漸臺宣室承明耳以此考之則玉堂殿乃武帝所造也僕後以問先生先生曰然馬永易元城先生語録唐制翰林學士初入院賜設并衣服中和節賜紅牙銀寸尺上已重陽並賜宴曲江清明賜新火夏賜氷臘日賜口脂及紅雪澡豆嵗前賜厯日有所修撰則賜茶果酒脯䇿試程文則賜設并匹帛社日賜酒蒸餅􅠑餅等事見唐人文集李邕號翰林六絶謂文學書翰等六事過人李絳初入院憲宗親擇笏以賜之李昉久掌内制太宗朝作相赴學士院敕設賦詩奏謝序述七盛如請真俸給食錢朱衣雙引初除宣召敕諭正謝賜鞍馬之類皆前代所無也太宗好儒嘗宣諭蘇易簡曰詞臣清美朕恨不得為之夜幸本院易簡已寝内侍以秉燭自牕照之俾其衣冠牕紗燃破後不復補以示優禮帝善書他日作飛白玉堂之署四字賜易簡至元豐中神宗一新官制學士與六尚書一等帶皆重金蘇子瞻謝表云玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥建炎改元予忝召命謝章以七盛對六絶燃牕對擇笏亦前輩偶然未用天禧元年二月學士院言詔敕詞尾並云故兹詔示故兹示諭方云想宜知悉内諸道進奉相承並不言詔示示諭竊思詔詞各有嘉奨之意亦各標云示諭今欲添入又諸處奏告青詞比来只是用紙褁角今請委三司造黒漆木筒五十枚凡有奏告封詞齎徃從之國朝會要乾興元年十月翰林學士晏殊等言先朝楊億再為學士班錢惟演之上今新添除學士劉筠天禧中已入翰林請如故序班臣等之上從之其後率如此例仁宗實録天聖元年十月詔翰林學士遇隻日至晩出宿盖故事以雙日鎖院隻日降麻也仁宗實録皇祐元年九月以翰林學士承㫖兼端明殿學士尚書户部郎中知制誥王堯臣加諫議大夫以久在禁林優遷之也堯臣嵗滿當遷宰臣文彦博以其久任請降此命二年九月十六日新除翰林學士稽潁未及謝卒詔賜告敕襲衣金鞍勒馬於其家至和元年九月翰林學士楊察為承㫖知制誥吕溱王洙並為翰林學士故事學士六員今洙為第七員盖宰相過除也嘉祐六年三月承㫖宋祁言久病不敢稽朝謁入學士院欲帶一子主湯藥從之七年二月學士院言臣僚上表并劄子陳請事惟宰臣樞密使方降手詔手書自參知政事樞密副使以下即無體例去年三月因樞密副使陳升之請郡内批令降不允手詔當直學士胡宿亦曽論奏以手詔體重乞只降不允詔而不從其請竊縁近禁動成故事恐成隳廢典故乞自今除宰臣親王樞密使有所陳請事依例或降手詔手書自餘臣僚更不降手書手詔許從本院執奏從之凡學士院置待詔十人國初承舊制翰林待詔六人寫書詔舊制月俸九千春冬給衣又有𨽻書待詔六人寫簽題封角月俸止六千謂之東頭待詔雍熈四年廢𨽻書待詔増翰林待詔十人並兼御書院祇候録事一人景徳二年九月本院言孔目官劉尚賓年滿已注宿遷縣尉縁主持書詔切須諳練欲乞依吏部銓例置主事或録事以本司勒留充職詔以尚賓為録事給孔目官俸自後不常置又五代舊制有主事一人周顯徳中廢孔目官六人表奏官六人驅使官二十人驅使官舊額六人咸平二年初置侍讀侍講學士别補驅使官四人祇應及楊徽之卒復以驅使官二人𨽻學士院因為八人三年四月詔學士院不得額外添人自後再除拜文明資政侍讀侍講龍圖閣樞密直學士皆學士院遣守闕驅使官祇應多特補正名遂至二十人景徳四年四月學士院上言先凖敕表奏驅使官闕人於京百司兩省三館抽差即不曽召保揀試本院見有守闕表奏官八人驅使官十二人今欲以此為守闕定額今後如是闕人即於京百司兩省私名内抽取依三館例召保揀試送中書看詳從之舊又有專知官一人通引官一人厨子六人太平興國四年並廢右六事國朝㑹要治平元年六月翰林學士馮京奏樞密使富弼臣妻父也今權知開封府當避弼不許英宗實録熈寧六年正月二十一日詔學士院今後大遼國書并諸國詔書合要匣復等並自下司取索訖關三司破除仍諭諸處更不申乞朝㫖七年十二月八日詔翰林學士知制誥至中書樞密院議事許繫鞋遇朔望及不因公事依例穿執十年十月三日學士院言編修諸司式所送本院式十卷編學士員數并録表疏青詞祝文鎖院敕設宿直之類看詳學士員數繫朝廷臨時除授若表疏青詞祝文或請禱之意不同難用一律况朝廷待學士禮意稍異宣召敕設盡出特恩關白中書樞密院止用諮報不同諸司乞下本所以吏人差補及官物出入之類並立為式學士所職更不編載從之元豐二年十一月翰林學士蒲宗孟乞敘班章惇下從之以惇先曽任翰林學士及夏服闋再為學士故也是年十月詔翰林學士並聽佩魚元祐元年七月詔從承㫖鄧温伯之請學士如獨員每兩日免一宿候有雙員即依故事右六事續會要政和五年十月徽宗皇帝御書摛文堂三字賜承㫖強淵明以榜於院徽宗實録紹興三十年五月太上皇帝御書玉堂二大字賜學士周麟之得㫖於都省宣示宰執俟中祕儤書俾侍從館閣官咸得觀仰刻石院中仍以石本分賜隆興元年十一月七日聖㫖學士院官經筵官日輪二員宿直於學士院以備顧問續降㫖揮遇赴徳夀宫起居聖節開啓滿散車駕詣景靈宫四孟朝獻國忌行香前一人及旬假節假每遇筵宴並與免宿隆興二年閏十一月敷文閣直學士王剛中除翰林學士以祖諱翰改除禮部尚書直學士院唐制自宰相而下初命皆無宣召之禮惟學士院在禁中非内官宣召無因得入故院門别設複門亦以通禁庭也又學士院北扉者為其在浴堂之南便於應召今學士初拜自東華門入至左承天門下馬待詔院吏自左承天門雙引至閤門此亦用唐故事也唐宣召學士自東門入者彼時學士院在西掖故自翰林院東門赴召非若今之東華門也至如挽鈴故事亦縁其在禁中雖學士院吏亦止於玉堂門外則其嚴密可知如今學士院在外與諸司無異亦設鈴索悉皆文具故事而已學士院玉堂太宗皇帝曽親幸至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據臺而坐今不復如此但存空臺而已玉堂東承㫖閤子牕格上有火燃處太宗嘗夜幸玉堂蘇易簡為學士已寝遽起無燭具衣冠宫嬪自牕格引燭入照之至今不欲更易以為玉堂一盛事右二事沈括筆談先公嘗言翰林學士居深嚴之地職任事體與外司不同至於謁見相府自非朔望慶弔止公服繫鞋而已學士於内庭出入或曲詔亦不具靴簡若同列齊行前此命朱衣吏雙引抗聲言學士来直至宫門方止歸院則朱衣遞聲呼學士来者數四故事學士叙班只在宰相後今之參知政事班位即舊日學士立班次處也近朝以来會敘内殿起居叙班在樞密宣徽使後惟大朝會入閤聖節上夀始得綴台司步武焉吾自延州歸闕再忝内職時與朱崖盧相同列依舊命吏前後雙引既而盧謂吾曰今府尹令尹時皇上開封尹兼中書令親賢英仁復兼右相尚以一朱衣前導吾儕為學士而命吏雙引因令罷去雙引自是抗聲傳呼之儀亦稍罷矣蔡文忠以翰林兼侍讀兩學士改龍圖閣學士知密州自翰林改龍圖出藩繇文忠始也右二事宋敏求退朝録丁晉公自保信軍節度使知江寧府召為參知政事中書以丁節度使召學士草麻時盛文肅為學士以為參知政事合用舍人草制遂以制除丁甚恨之太宗時宋白賈黄中李至吕䝉正蘇易簡五人同時拜翰林學士承㫖扈䝉贈之以詩云五鳳齊飛入翰林其後吕䝉正為宰相賈黄中李至蘇易簡皆至參知政事宋白官至尚書老於承㫖皆為名臣楊大年為學士時草答契丹書云鄰壤交歡進草既入真宗自注其側云朽壤鼠壤糞壤大年遽改為鄰境明旦引唐故事學士作文書有所改為不稱職當罷因亟求解職真宗語宰執曰楊億不通商量真有氣性故事學士在内中院吏朱衣雙引太祖朝李昉為學士太宗在南衙朱衣一人前引而已昉亦去其一人至今如此徃時學士入劄子不著姓但云學士臣某先朝盛度丁度並為學士遂著姓以别之其後遂皆著姓唐人奏事非表非状者謂之牓子亦謂之録子今謂之劄子凡羣臣百司上殿奏事兩制以上非時有所奏陳皆用劄子中書樞密院事有不降宣敕者亦用劄子兩府自相徃来亦然此例也是年議裁省百司冗費學士院月給飡錢三百千學士食料待詔人更等添給鎖院御藥并人從宣召俠行家事例皆用此錢亦在裁去之數余與宰相論之不從因經筵奏事為上言七盛故事云飡錢其一也祖宗舊典近嵗未嘗増數豈可與百司弊事同廢哉上大以為然令傳㫖如故朱勝非秀水聞居録翰苑羣書卷十二
