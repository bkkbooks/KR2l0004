body:
  text: 翰苑羣書卷八宋洪遵編蘇易簡續翰林志上李肇述翰林志禁庭之事詳矣至其引宋昌之言曰所言公則公言之所言私則王者無私之説言翰林制置任用非王者之私識者以為知言自唐氏之制駕在大內則於明福門內置院駕在興慶宫則於金明門內置院德宗時移院於金鑾坡上迄咸鎬為墟以梁苑為東都今二京學士院之制並在樞密宣徽院之北蓋表其深嚴宥密焉其學士立班常朝暨聖節行香并大忌進名並隨樞密使坐次及行幸大宴在參知政事之後從北為首每三元張燈及賜酺上御乾元樓臨軒觀樂憑欄設次坐在上將軍之上郊祀籍田青城之內設幕次於殿門東偏别設氊廬以為寢所蓋備密命焉元稹翰林承旨學士記曰舊制學士無得以承旨為名者應對顧問參會班第以官為上下憲宗以永貞元年即大位始命鄭絪為承旨學士位在諸學士上居位在東第一閣乘輿奉郊廟輒得乘廏馬自浴殿由內朝以從揭雞竿布大澤得升丹鳳之西南隅外賓客進見於麟德則上直禁中以俟凡大詔令大廢置丞相之密畫內外之密奏上之所甚注意者莫不專對他無得而比也後唐長興元年二月翰林學士劉昫奏臣伏見本院舊例學士入院除中書舍人即不試其餘官資皆須先試麻制答蕃書批答各一道詩賦各一首號曰五題所試並是當日內了便具進呈從前雖有召試之名而無考校之實每值召試新學士日或有援者皆預出五題暗令宿搆至時但寫淨本便取職名若無援者即臨時特出五題旋令起草縱饒負藝罕能成功去留皆繫於梯媒得失盡由於偏黨此乃抑挫孤寒之道開張巧偽之門積弊相沿澆風未改將禆聖政須立新規况今伏值皇帝陛下德合乾坤明懸日月大興淳化盡革澆風矧惟翰墨之司專掌絲綸之命宜從正直務絶阿私自今後凡有本院召試新學士欲請權停詩賦只試麻制答蕃書并批答共三道仍請內賜題目兼定字數付本院召試然後考其臧否定其取捨貴從務實以示均平庶令孤進者得展勤勞朋比者不能欺罔事關穩便合貢芻蕘從之後唐天成三年八月敕掌綸之任擢才以居或自初命而升或自顯秩而授蓋重厥職靡繫其官雖事分皆同而行綴或異誠由往日未有定規議官位則上下不常論職次則後先為敘宜行顯命當正近班今後翰林學士入並以先後為定惟承旨一員出自朕意不計官資先後並在學士之上仍編入翰林志旋召張昭逺下一字與漢祖御名同後只名昭入院以其早踐綸闈久司史筆曽居憲府纍陟二卿今既擢在禁林所宜别宣班序其立位宜次崔梲夫禁庭之職儒者之至榮外望之所忌豈居是職者專列人之短於君父之前邪則為恭顯靳費之流耳奚為服儒服而食天祿乎唐陸贄抗疏論吳通玄弟兄云學士是天子私人侵敗綱紀宰臣有備位之號不知贄於是時所為何如哉貞元中時人謂學士為內相亦忌其親密也晉天福六年五月詔曰六典云中書舍人掌侍奉進奏參議表章凡詔旨制敕璽書䇿命皆案故事起草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也古昔以來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以耀前規其翰林學士院公事宜並歸中書舍人從宰臣馮道之奏也自是舍人晝直者當中書制夜直者當內制至開運元年六月復有詔曰翰林學士與中書舍人分為兩制各置六員偶自近年權停內署況司詔命必在深嚴將使從宜却令仍舊宜復置學士院蓋宰臣桑維翰秉政將戾於道故乃復焉自此班秩再有倫矣凡儤直之數上自諸行尚書三十五直下至白身一百四十直必須圓融其直先五直舊學士一點次三直一點又次二直一點此三等隨日多少令其均勻永為定式晉開運中楊昭儉直綸閣酌其從來儤直之數等第除減條為定式申中書門下仍刻石在壁員外郎入舊八十直改為五十直郎中入舊六十直今改為四十直他官入舊一百直改為八十直自員外郎知制誥轉正郎仍舊六十直改為三十直正拜舍人舊四十直今為二十直自常侍諫議給事拜舍人舊四十直改為二十直應舊官再入約前任減半今附乎此貴存舊章其內制儤直及吉凶疾病諸假則例自具翰林舊規學士起復之制周朝已前未聞其例周世宗時故內翰王公著今揆相李公昉俱遭內艱屬世宗北伐並起復隨駕書詔繁委之際即不遑敘合儤直與不儤直迄皇朝端拱元年閏五月易簡遭家艱奉詔抑奪遂與翰長以下商議依鳳閣壁記體例同舊官再入約計前直減半是時復儤直二十五直矣至皇朝今揆相李公獨直禁中奉旨令每雙日夜直隻日下直可以永為通式也四禁之中漏泄為最故草制之夕遲明必闔院門之雙扉當制學士坐於玉堂上止吏人之出入者俟宣制訖方啓户焉文翰之職優待之異者後唐同光中賜承旨學士盧質論思翊佐功臣旋授節制河中馮瀛王送之詩云視草北來唐學士擁麾西去漢將軍時人榮之梁開平中以前進士鄭致雍為學士晉開運中賜本院書詔金印一面周顯德中以向來學士與常參官五日一度起居世宗欲令朝夕接見訪以時事乃下詔曰翰林學士職係禁庭地居親近與班行而既異在朝請以宜殊起今後當直下直學士並宜令逐日起居其當直學士仍赴晚朝舊制每命將出師勞還曲宴於便殿則當直學士一人與文明密直得預坐今揆相李公故尚書扈公早在禁林曽預斯宴後為閣門使梁迥輕鄙儒士􅪥太祖罷之至皇朝太祖英武聖文神德皇帝因致酒於紫雲樓下命兩制侍宴歡甚因命中書舍人來晨宜綴內制起居令為通式仍各賜書千卷以備檢閲舊體每遊宴止學士得赴召暨皇上留心儒墨旋賞文翰時綸閣之士始召赴曲宴或令和御詩舍人從遊宴自此始也厥後立春鏤銀飾彩幡勝之物亦及之太平興國八年召閣下舍人李公穆宋公白賈公黃中吕公蒙正李公至入院時承旨扈公蒙贈詩賀之有五鳳齊飛入翰林之句為一時之盛事其或觀稼於南薰門賞花於含芳園春盡嚴蹕百司景從幸國西之金明池下雕輦登龍舟都人駕肩百樂具舉憩瓊林苑由復道御層樓臨軒置酒以閲繁盛兩制必侍從焉至上林春融千花萬卉妍麗冠絶上必曲宴宰衡勳舊召兩制詞臣俯龍池垂金鉤舉觴賦詩終日而罷上嘗謂宰執近臣曰詞臣實神仙之職也翊日凡所進詩悉闕御毫屬和以賜焉雍熙三年十月敕曰兩制詞臣公朝精選典司綸誥親近冕旒宜於俸祿之間特示優異起今後兩制俸料並以見緡充上聽政之暇搜訪鍾王之迹以資閲玩焉御毫飛動神機妙思出其軌制乃召書學之有格性者置於便殿躬自省閲仍授以筆法既覩其有成各賜以章服象笏令入院充待詔者八人自是書詔字四出寰海之內咸識禁中之墨妙焉舊體學士凡召入院止賜白成釕都了反口銀鞍勒馬暨今上即位優待特異賜金鍍銀閙裝鞍勒馬對衣荔枝金帶郊禋禮畢賜對衣金帶或牯犀帶金魚副之朝士自唐末久闕佩魚者迄今方復之十月朔舊賜對衣紅錦袍上特以細花熟錦袍代之淳化三年冬代以細花盤雕錦袍其制下丞相一等自是逺方之珍果天府之法釀龍鳳之茗荈伏臘之餅餌以時而賜悉加等焉玉堂東西壁延袤數丈悉畫水以布風濤浩渺擬瀛洲之象也待詔董羽之筆修篁皓鶴悉圖廊廡竒花異木羅植軒砌每外喧已寂內務不至風傳禁漏月色滿庭真人世之仙境也蘇易簡續翰林志下學士拜命先閣門受制書於常朝殿門之階上舊體召入院後差中使賜拜伏跪受訖於便殿對揚陳述寵用遭值之由謂之告謝上必從容賜坐錫以茶藥而退選日謝恩前一日待詔一人就宅宣召預於庭設裀褥堂設酒醴待詔稱有敕望皇居拜伏聽命其辭皆奬飾嚴召之意於本院舊學士處請本又舞蹈訖升堂飲饌以謝恩奏狀拜伏跪授之來日待詔迎於待漏院與新學士偕行引至閣門而退閣門舍人始引入中謝賜對衣金帶金塗鞍勒馬近例就院轉官惟承旨則賜分物敕設如初拜之禮餘不得比矣入本院上事宣徽院告報敕設儀鸞宿陳帟幕太官備珍饌設上尊酒茗果畢至赴是設者止鳳閣舍人餘不得預坐舊體禁中上事元無樂前代或有令伎藝人弄獼猴藏珠之戲者玉堂之上惟上事受吏人賀禮始得正坐餘雖承旨亦須坐於東廂其副翰坐西廂餘依雙隻對坐居是職者人物之選亦已極矣儒墨之榮亦已至矣茍能節用以安貧杜門以省事探真如之旨養浩然之氣來者瞻望其出處時君優假其顔色逍遙卒嵗非神仙而何每上直一依舊制入者先之出者後之或會食日旰之後同列出院當直學士茍已褫巾笏則可紗帽靸履送至玉堂之簾下蓋同列相恕其坦率也或禁直垂簾人靜之際則有中使忽降御詩宣令屬和則必尋拜謝狀後信宿方和進如聲韻竒險難以賡載者必拜章瀝懇陳述寡和之意優詔多免焉每錫賜謝恩奏狀必當直草或郊禋行慶制命填委必聚廳以分草之其餘書詔辭祝頃刻之間雖繽紛而至必獨當之或數直有不草一詞者自可探賾往誥研窮理體以備顧問焉李肇翰林志曰凡將相告身用金花五色綾紙唐乾寧二年十月十日李鋋自黔南節相授京兆尹兩度咨報中書用白綾紙今親王相告身並用金花五色白背綾紙皇后貴主用金花五色背羅紙不帶使相者用金花五色白背綾紙觀察使及參知政事樞密副使簽署樞密院公事並五色綾紙無金花諸蕃酋長蠻王鬼主官告中書省草詞送本院寫皆五色綾白背紙一本作白大綾紙俱新制也舊體樞密使未帶使相者不宣麻至周太祖初潛歷是始乃宣制於公朝今之宣麻自周太祖始也晉天福二年中書奏準翰林志凡赦書德音立后建儲行大誅討拜免三公宰相命將內制並使白麻紙不使印雙日起草候閣門鑰而後進呈至隻日百寮立班於宣政殿今於文德殿樞密使引案今以閣門使引自東上閣出若拜免宰相即付通事舍人餘付中書門下並通事舍人宣示若機務急速亦使雙日甚速者雖休假亦追班據翰林志言立后不言立妃言儲君不言親王公主兼三師位在三公之上文並不載今後立妃及拜免三師三公宰相命將封親王公主並降制命餘從令式天成三年十二月日學士院記事樞密院近送到知髙麗國諸軍事王建表令賜詔書者其髙麗國先未曽有人使到闕院中並無彼國詔書式樣未審呼卿為復呼汝兼使何色紙書寫及封褁事例伏請特賜參酌詳定報院者中書帖太常禮院令具體例分析申堂據狀申謹案太宗親平其國不立後嗣是以書詔無賜髙麗國式樣且東方最大是新羅國請約新羅國王書詔體例修寫奉敕所賜髙麗王書詔宜依賜新羅渤海兩蕃書詔體書寫天復三年七月二十一日學士栁璨宣對思政殿便令到院宣示待詔自今後凡寫敕後而不得留空紙但圓融畫敕及日便得剩紙璨即日宣示之周顯德中宣諭翰林院今後凡與諸王詔書除本名外其文辭內有字與本名同者宜改避之唐韋處厚翰林學士壁記言禁林之材用備矣迄朱梁而下以大才登大用比比而去此不能録今略紀數公事迹以表世不乏賢也餘具譜牒國史謹厚則竇儀李懌徐台符吳承範典麗則李浣陶穀張沆商鵬魚崇諒扈蒙放誕則王著歐陽炳審音則竇儼孝謹則劉溫叟嗜學則張昭申文炳其餘不可勝紀惟陶與竇直禁林之傑者而竇以凝重陶以輕躁圓鑿方枘即可知矣李懌於天成中入直禁署時宰執以司會貢士呈試多不合格式起請令翰林學士各為格詩格賦一首以為繩凖時同職各已撰成送中書中書吏纍督懌令撰之懌曰李某識字有數因人成事茍令復應進士落第必矣今備位禁署後生可畏焉能以格詩格賦垂於世哉終不下筆時論喧然以為知大體承範以稟賦敦厚時宰屢有薦延言可大用公台之望日隆矣每盛暑必危坐奧室加以純綿慮有寒濕之疾其自重也如此卒不登用其命也夫沆與承範及鵬皆盧華侍郎下進士擢第同年范禹稱江文蔚流落吳蜀亦居偽廷之內署一榜之內學士五人自有科第已來未有若斯之盛者也台符早以亂罹曽陷北庭因間遁歸所乘馬常多嘶鳴暨晝伏宵行則帖爾屏息逮至中土嘶鳴如故識者以為積善之徵後處禁林周世宗必欲置之廊廟將擇吉日宣制一日內直忽終於玉堂車駕親臨救以上藥已奄然矣浣以詞藻特麗俊秀不羣長興中於太傅和魯公下進士擢第未數載與座主同列內署和大拜之制浣實草之不俟和命其閣中器皿動用盡掊歸私室以為濡潤後以石晉不造陷於北庭亦神鋒太俊之致也周世宗初踐祚北征劉崇旋召魚公復掌文翰時以母老侍養於陜府久而不至乃召陶公陶則不俟駕行謁見行在且稱崇諒懼劉崇兵勝有顧望之意上益不樂自此升沈不侔矣陶厥後自以官居八座位至承旨且欲軋同列之官卑者乃起請令今後學士合班儀在諸行侍郎之下如官至丞郎者即在常侍之上官至尚書者依本班迄今以為凖焉與夫先人後己之道戾矣士大夫嘉其文而鄙其行焉舊體知制誥在尚書之上學士在左右僕射之上蒙以仲弟載先直禁署未幾即世蒙繼入焉洎居兩制出處僅三十年嘗預修五代史至於衰耄頗倦直形於詞色後以工部尚書解職不數月而逝著以周世宗代邸舊寮倍有眷注暨世宗即大位亦嘗於曲宴揚袂起舞上優容之或夜召訪以時政屢沈湎不能言炳以偽蜀順化旋召入院嘗不巾不襪見客於玉堂之上尤善長笛太祖嘗置酒令奏數弄後以右貂終於西洛儼乃儀之仲弟也嘗與儀連翩知貢舉直內制時比之二陸焉昆季五人皆擢進士第時亦謂之五龍閨門之盛近實罕比周世宗顯德五年冬將立嵗仗前一日親至於樂懸之下問雅音於工師皆不能答因令儼知太常卿事與樞密使王朴同詳定之乃用古纍黍之法以審其度造成律準其形如琴而巨凡十二絃以定六律六吕旋相為宫之義世宗善之至是登歌酌獻始有倫矣溫叟乃太常卿嶽之子也於晉室開運中召入院乃捧命書慶於髙堂其母不登時見之溫叟在堂下俟命聞動扃鑰聲莫審其由未幾兩青衣皆丱角舉一箱其中則紫綬兼衣立於庭中母方命捲簾見其子曰此即爾父在禁中日內庫所錫者溫叟即搢笏垂泣跪捧退開家廟列祀以文告之其母僅旬日不見其子蓋感愴之意也昭以嗜學苦節冠於搢紳清資華貫無所不歷於唐末簡䇿遺墜之後能糾合遺言著成唐書至於褒貶是非咸得其理文炳為學之志老而彌篤躬抄圖史僅盈數篋其所為文多自注釋之筆迹老熟人尚有傳者餘悉位以才升何暇評品其文格焉夫學士之稱職之至美也至於列位黃閣尚帶大學士之號唐張説猶讓而不處焉則為儒之貴莫越於此唐朝侍講侍書侍讀皆帶此職後唐同光元年置護鑾書制學士以倉部員外郎趙鳳為之梁開平三年正月改思政殿為金鑾殿置大學士一員以景翔為之與館殿大學士同至皇朝太平興國五年始命禮部侍郎程羽為文明殿學士文明之號自茲始也後唐天成元年命馮道趙鳳充端明殿學士非舊號也仍詔云班立在翰林學士之上如有轉改只於翰林學士中選蓋樞密使不曉文義故署此職馮道笏記云天下儒生僅餘萬數殿前學士只有兩人時輩榮之本職在官下趙鳳轉侍郎遣人諷任圜移職在官上至今為例梁開平元年五月改樞密院為崇政院命景翔為院使二年十月置崇政殿直學士兩員選有政術文學者為之始以尚書吏部郎中吳藹兵部郎中李􅓨金門之兄充選又改為直崇政院後唐同光中依舊為樞密院亦置密直學士一人班次在翰林學士之下上之數職雖非視草入直而職名相近故亦附於志云丙成嵗易簡始自祠曺外郎知制誥蒙恩召入院逮今六載略無塵露以益山海今嵗驟自祠曺正郎改授中書舍人充承旨之職非才非望益負愧惕因視草之暇集成此書以繼李公之作餘後之制置新規俟他日别加編纂焉時皇宋龍集辛卯淳化紀號之二年孟冬朔日翰苑羣書卷八
