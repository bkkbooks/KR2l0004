body:
  text: 翰苑羣書卷四宋洪遵編韋執誼翰林院故事翰林院者在銀臺門内麟徳殿西重廊之後盖天下以藝能伎術見召者之所處也學士院者開元二十六年之所置在翰林院之南别户東向考視前代即無舊名貞觀中祕書監虞世南等十八人或秦府故寮或當時才彦皆以𢎞文館學士會於禁中内參謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士其後永徽中黄門侍郎顧琮復有麗正之稱開元初中書令張說等又有集仙之目皆用討論未有典司𤣥宗以四隩大同萬樞委積詔勅文誥悉由中書或慮當劇而不周務速而時滯宜有偏掌列於宫中承導邇言以通密命由是始選朝官有詞藝學識者入居翰林供奉别㫖於是中書舍人吕向諫議大夫尹愔首充焉雖有密近之殊然亦未定名制詔書敕猶或分在集賢時中書舍人張九齡中書侍郎徐安貞等迭居其職皆被恩遇至二十六年始以翰林供奉改稱學士由是遂建學士俾專内命太常少卿張垍起居舍人劉光謙等首居之而集賢所掌於是罷息自後給事中張埱中書舍人張漸竇華等相繼而入焉其外有韓翃閻伯璵孟匡朝陳兼蒋鎮李白等在舊翰林中但假其名而無所職至徳以後軍國務殷其入直者並以文詞共掌誥敕自此北翰林院始無學士之名其後又置東翰林院於金鑾殿之西隨上所在而遷取其便穏大扺召入者一二人或三四人或五六人出於所命盖無定數亦有鴻生碩學經術優長訪對質疑主之所禮者頗列其中崇儒也初自徳宗建置以来秩序未立廷覲之際各趨本列暨貞元元年九月始有别敕令明預班列與諸司官知制誥同列故事中書以黄白二麻為綸命重輕之辨近者所出獨得用黄麻其白麻皆在北院自非國之重事拜授將相徳音赦宥則不得由於斯稽夫發揮大猷藻繪上命隻簡片削可以動乎人神風行四方萬里始覲非制誥之謂歟盖人君深拱端黙於穆清之中茫茫九區視聴不及雖堯徳舜智湯明禹哲不能庭䇿以朝告不能家閱以户臻必欲忘典謨掩訓誓隂諭於天下密符於胷襟洪荒以還所蔑聞也故議定於内而事修於外言發於上而㫖達於人㣲乎斯百度闕矣况此院之置尤為近切左接寝殿右瞻彤樓晨趨瑣闥夕宿嚴衞密之至也驂鑣得御廏之駿出入有内使之導豐餚潔膳取給大官衾裯服御資於中庫恩之厚也備待顧問辨駮是非典持縑牘受遣羣務凡一得失動為臧否職之重也若非謹恪而有立秉貞而通理俾又樞要簡於帝心言不及温樹之名慎不遺轅馬之數處是職者不亦難乎至於強學修詞刀筆應用或久洽通儒之望或早升文墨之科雖必有之乃餘事也自立院已往五紀於兹連飛繼鳴數逾三十而屋壁之間寂無其文遺草簡略於㭊編求名時得於邦老温故之義於斯闕如羣公以執誼入院之時最為後進紀敘前輩便於列詞收遺補亡敢有多讓其先後嵗月訪而未詳獨以官秩名氏之次述於故事庶後至者編繼有倫貞元二年龍集景寅冬十月記開元已後吕向自中人充供奉出為工侍尹愔自大諫充供奉劉光謙自起人充累改司中又充張垍自太常卿充貶盧谿郡司馬張淑自給中充張漸自中人充竇華自中人充裴士淹自給中充出為禮侍至徳已後董晉自校書郎充出為汾州司馬于可封自補闕充出為司業蘇元明自中書舍人充趙昂自太博充祠外又充卒於駕外潘炎自五驍衞兵曺充累改駕中又充中人又充出守本官寶應已後常衮自補闕充遷考中又充出知制誥栁伉自校書郎充出鄠縣尉改太博又充兵外又充大諫又充尋丁憂于益自駕部員外充大諫又充卒張涉靖恭太子廟丞充遷左省常侍又充卒于肅自比外充考中又充給中又充卒建中已後張周自洛陽尉充改河南縣丞又充改兵曺又充改虢州司馬又充姜公輔自拾遺充改京兆府尹曺又充遷大諫平章事趙宗儒拾遺充屯外又充出守本官歸崇敬司業充常侍又充戸曺又充工書又充兵書致仕貞元已後陸贄祠外充考中又充大諫又充中人又充丁憂權兵侍又充吳通微金外充職中又充知誥又充賜紫改大諫又充與通𤣥是兄弟吳通𤣥侍御史充起人又充又知制誥又賜紫又大諫充並同年月日授顧少連水外充禮中充又中人充出為户侍吳陟起郎充病不入吉中孚司封郎中知誥充大諫又充出為户侍判度支韋執誼拾遺充又知制誥又賜緋又起人充梁肅補闕兼太子侍讀充韋綬補闕充鄭絪封外知誥充賜緋鄭餘慶庫中充衞次公補闕内供奉充李程察院充水外又充王涯藍田尉充補闕供奉又充張聿正字充拾遺又充李建校書郎拾遺充出為府司直淩凖浙東判官充都外又充出判度支王叔文起人充出為度支副使王伾翰林待詔充改常侍賜紫李吉甫裴垍元和已後李絳東臺察院充水外又充中人又充出為户侍改中書侍郎平章事崔羣補闕充庫外又充郎中又充中人又充出為禮部侍郎白居易盩厔尉授集賢校理充拾遺又充京兆府户曺又充錢徽左補闕充祠外又充中人又充出守本官韋𢎞景獨孤郁補闕充病拜秘書少監卒贈絳州刺史蕭俛駕中充又加知制誥出守本官劉從周補闕充卒贈禮部員外徐晦都外充賜緋封中又充出守本官令狐楚職外知誥充又賜緋又正郎充中人又充出守本官郭求藍田尉授集賢校理充拾遺又充出守本官王涯中書舍人充又賜緋段文昌祠部員外充張仲素禮部員外充杜元穎太博充拾遺又充沈傳師補闕充李肇監察御史充翰苑羣書卷四
