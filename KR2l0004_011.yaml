body:
  text: 翰苑羣書卷十一宋洪遵編翰苑題名翰苑自唐寶應迄於大中學士官族皆刻石龕之屋壁五季以紛擾久廢藝祖受命首建直廬太宗親灑玉堂之翰以増寵奨聖聖稽古推擇尤靳景徳初趙安仁晁迥李宗諤始復置壁記起國初自承㫖陶穀以下至直院用除授次第刋列後居職者皆得以流芳久逺中遭變故今不復存睿主中興偃武右文揀求鴻碩追坦明之制如二帝三王之盛以章列聖之休規模逺矣而姓名未紀来者何觀學士秦公梓再有建請未幾出守宣城因循迄今該猥以淺陋寓直骫骳之文豈足以潤色丕業顧獲繼諸公之後託名於不朽欣幸之極乃為之序紹興十八年七月既望左中奉大夫權尚書禮部侍郎兼直學士院沈該謹序朱勝非建炎元年五月以中書舍人兼權直院八月除禮部侍郎依舊兼權十一月除翰林學士二年五月除右丞相王陶建炎元年六月以給事中兼權直院十二月除禮部侍郎依舊兼權二年除工部尚書葉夢得建炎二年以户部侍郎除翰林學士十一月除左丞康執權建炎二年以吏部侍郎兼權直院是年罷盧益建炎二年以兵部侍郎兼權直院是年罷孫覿建炎二年以吏部侍郎兼權直院三年正月罷李邴建炎二年十一月以兵部侍郎兼權直院三年二月除翰林學士三月除簽書樞密院事張守建炎三年三月以起居舍人兼權直院尋除中書舍人依舊兼權四月除御史中丞詹乂建炎三年三月以龍圖閣學士兼權直院六月罷滕康建炎三年四月以諫議大夫除翰林學士五月除簽書樞密院事曽楙建炎三年八月以徽猷閣直學士提舉西京嵩山崇福宫除翰林學士是月除禮部尚書張守建炎三年六月以禮部侍郎除翰林學士九月除簽書樞密院事汪藻建炎三年七月以中書舍人兼權直院是年除給事中依舊兼權四年七月除兵部侍郎依舊兼權紹興元年五月除翰林學士九月除龍圖閣直學士知湖州綦崈禮建炎四年五月以吏部侍郎兼權直院十月除徽猷閣直學士知漳州席益紹興元年八月以中書舍人兼權直院十月罷胡交修紹興元年十月以給事中兼權直院二年宫觀綦崈禮紹興二年二月以吏部侍郎兼權直院七月除兵部侍郎依舊兼權九月除翰林學士四年七月除寶文閣學士知紹興府翟汝文紹興二年三月以顯謨閣直學士致仕除翰林學士承㫖四月除參知政事沈與求紹興二年七月以吏部尚書兼權翰林學士十二月宫觀徐俯紹興三年二月以諫議大夫除翰林學士是月除簽書樞密院陳與義紹興三年七月以吏部侍郎兼權直院四年四月除禮部侍郎依舊兼權八月除徽猷閣直學士知湖州孫近紹興四年七月以吏部侍郎兼直院五年二月除翰林學士十一月除吏部尚書兼權翰林學士六年八月除龍圖閣學士知紹興府沈與求紹興四年八月以吏部尚書兼權翰林學士九月除參知政事胡交修紹興五年二月以刑部侍郎兼權直院十一月除翰林學士六年四月除刑部尚書朱震紹興六年五月以給事中兼權直院是月除翰林學士八年六月致仕陳與義紹興六年六月以中書舍人又兼權直院十一月除翰林學士七年正月除參知政事胡世将紹興七年正月以給事中兼直院九月除兵部侍郎依舊兼八年正月除樞密直學士四川安撫制置使兼知成都府胡寅紹興八年四月以禮部侍郎兼權直院五月以憂去曽開紹興八年五月以禮部侍郎兼權直院十二月除寳文閣侍制知婺州吕本中紹興八年六月以中書舍人兼權直院十月罷勾龍如淵紹興八年十月以中書舍人兼直院十一月除御史中丞孫近紹興八年十月以龍圖閣學士知紹興府除翰林學士承㫖十一月除參知政事樓炤紹興八年十一月以給事中兼權直院九年二月除翰林學士三月除簽書樞密院事李誼紹興九年三月以中書舍人兼直院九月除工部侍郎依舊兼十年正月除工部尚書胡交修紹興九年六月以兵部尚書兼權翰林學士十年十一月除端明殿學士知台州林待聘紹興十年五月以中書舍人兼權直院十二月除給事中依舊兼權十一年七月除兼直院十二月以憂去范同紹興十年十二月以給事中兼直院十一年五月除翰林學士七月除參知政事程克俊紹興十一年十一月以給事中兼權直院十二年四月除兼直院九月除翰林學士二月除簽書樞密院事吴表臣紹興十二年正月以吏部尚書兼權學士院二月罷秦梓紹興十一年九月以敷文閣直學士兼權直院十月除兼直院十三年閏四月除翰林學士六月除龍圖閣學士知宣州王賞紹興十二年十月以權禮部侍郎兼權直院十三年五月除禮部侍郎依舊兼權十二月罷洪皓紹興十三年八月以徽猷閣直學士提舉萬夀觀兼權直院九月依舊職知饒州楊愿紹興十二年十月以給事中兼權直院十四年三月除兼直院十一月除御史中丞劉才卲紹興十三年十二月以起居舍人兼權直院是月除中書舍人依舊兼權十四年二月罷秦熺紹興十四年三月以禮部侍郎兼直院十五年正月除翰林學士六月除翰林學士承㫖十月除資政殿學士提舉萬夀觀段拂紹興十四年十一月以中書舍人兼權直院十六年正月除給事中依舊兼權十一月除兼直院十七年三月除翰林學士是月除參知政事錢周材紹興十七年三月以中書舍人兼權直院六月罷丕鎡紹興十七年六月以中書舍人兼權直院十二月致仕邊知白紹興十七年十二月以權吏部侍郎兼權直院十八年五月罷李椿年紹興十八年正月以權户部侍郎兼權二月除户部侍郎沈該紹興十八年正月以權禮部侍郎兼直院八月除敷文閣侍制知潼川府相李椿年紹興十八年八月以户部侍郎兼權直院十九年十一月罷巫伋紹興十九年十一月以給事中兼權直院二十年三月除簽書樞密院事王曮紹興二十年三月以起居舍人兼權直院二十一年四月除權禮部侍郎湯思退紹興二十年三月以祕書少監兼權直院二十一年四月除起居舍人二十二年十月除權禮部侍郎二十四年十一月除禮部侍郎二十五年六月除簽書樞密院事相沈虚中紹興二十五年六月以國子司業兼權直院八月除權兵部侍郎二十六年二月罷陳誠之紹興二十五年十二月以敷文閣直學士知泉州除翰林學士二十六年九月除同知樞密院事劉才卲紹興二十六年三月以工部侍郎兼權直院二十七年四月除顯謨閣直學士提舉江州太平興國宫王綸紹興二十七年二月以中書舍人兼權直院六月除工部侍郎直院二十八年二月除同知樞密院事楊椿紹興二十八年二月以給事中兼權直院二十九年二月除兵部侍郎直院十二月除兵部尚書兼權翰林學士三十一年三月除參知政事周麟之紹興二十八年二月以中書舍人兼權直院八月除兵部侍郎直院十二月除給事中二十九年閏六月除翰林學士三十年七月除同知樞密院事洪遵紹興三十年八月以吏部侍郎除翰林學士十二月除徽猷閣直學士提舉江州太平興國宫何溥紹興三十一年三月以左諫議大夫除翰林學士三十二年三月除龍圖閣學士提舉江州太平興國宮虞允文紹興三十一年九月以中書舍人兼權直院三十二年二月除兵部尚書川陜宣諭使相劉珙紹興三十一年十二月以起居舍人兼權直院三十二年三月除中書舍人五月兼直院隆興元年十一月除集英殿修撰知泉州唐文若紹興三十一年十二月以起居郎兼權行宮直院三十二年二月車駕囘依舊洪遵紹興三十二年五月以徽猷閣直學士知平江府除翰林學士六月除承㫖隆興元年五月除同知樞密院事史浩紹興三十二年六月以中書舍人除翰林學士八月除參知政事相錢周材隆興元年六月以中書舍人兼直院十月除給事中二年二月以憂去王之望隆興元年十一月以權户部侍郎兼權直院十一月除權吏部侍郎二年四月除左諫議大夫張孝祥隆興二年二月以中書舍人兼直院三月除敷文閣侍制知建康府馬騏隆興二年三月以起居舍人兼權直院四月除直敷文閣知遂寧府洪适隆興二年四月以太常少卿兼權直院九月除中書舍人閏十一月兼直院乾道元年五月除翰林學士六月除簽書樞密院事相王剛中隆興二年閏十一月以敷文閣直學士除翰林學士以避祖諱改除禮部尚書直學士院十二月除簽書樞密院事蒋芾乾道元年正月以起居郎兼權直院七月除中書舍人兼直院二年五月除簽書樞密院事相何俌乾道元年正月以權工部侍郎兼權直院三月除集英殿修撰知衢州王曮乾道元年九月以權禮部侍郎兼直院工年五月除中書舍人九月除給事中三年閏七月除敷文閣侍制提舉江州太平興國宫洪邁乾道二年十月以起居舍人兼權直院三年五月除起居郎七月除中書舍人兼直院四年六月除集英殿修撰提舉江州太平興國宫劉珙乾道三年閏七月以敷文閣直學士知潭州除翰林學士十一月除同知樞密院事莫濟乾道三年十一月以宗正少卿兼權直院四年十一月以憂去汪應辰乾道四年十一月以吏部尚書兼權翰林學士六年四月除端明殿學士知平江府梁克家乾道四年十一月以給事中兼直院五年二月除簽書樞密院事相陳良祐乾道五年四月以給事中兼直院六年二月除吏部侍郎閏五月罷鄭聞乾道六年四月以中書舍人兼直院七年三月除寶文閣侍制提舉江州太平興國宫周必大乾道六年七月以祕書少監兼權直院七年七月除權禮部侍郎八年二月宫觀王曮乾道七年四月以給事中除翰林學士八年三月除承㫖九年三月除端明殿學士提舉江州太平興國宫鄭聞乾道八年七月以刑部侍郎兼直院九月除權刑部尚書王瀹乾道九年閏正月以宗正少卿兼權直院七月除權工部侍郎王淮乾道九年四月以太常少卿兼權直院七月除中書舍人兼直院翰苑羣書卷十一
