  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0004_WYG_007-1a, image: WYG0595/WYG0595-0372c.png}
body:
  text: 翰苑羣書卷七宋洪遵編禁林宴會集御書飛白玉堂之署四字頒賜禁苑今懸挂已畢輒述惡詩一章用歌盛事右僕射平章事監修國史李昉玉堂四字重千金宸翰親揮賜禁林地望轉從今日貴君恩無似此時深宴回上苑花初發麻就中宵月未沈衣惹御香拖瑞錦筆宣皇澤灑春霖院門不許間人入承旨學士舉舊事置鈴索於院門聞人不許輒入仙境寧教外事侵我直承明踰二紀臨川實動羡魚心昉頃在禁林前後出處凡二十有五載不逢今日之盛事者有七新學士謝恩日賜襲衣金帶寶鞍名馬一也十月朔改賜新樣錦袍二也特定草麻例物三也改賜內庫法酒四也月俸並給見錢五也特給親事官隨從六也新學士謝恩後就院賜敕設雖為舊事而無此時供帳之盛七也凡此七事並前例特出異恩有以見聖君待文臣之優厚也臨川之羡其在兹乎御書飛白玉堂之署三體宸章併宣禁苑覩茲盛事輒動斐然尚書吏部侍郎同中書門下平章事張齊賢寵深仙署降新牌御筆親題重俊才四字千齡懸日月兩篇三體琢瓊瓌登科郤桂皆同樹入室丘門盡仰回余與承旨學士皆御前科選而學士最受聖恩顧遇則前後門生俱深榮羡故有是也寓直靜封芝檢去密宣榮對玉泉來職清望峻人稀見地貴扃嚴晝罕開多幸謬持黃閣柄煙霄時得遂遊陪伏覩禁林盛事謹賦一章給事中參知政事賈黃中上璇題飛白御毫新三體瓊章妙入神特賜禁林為盛事只緣明主重名臣青編輝映輕前古丹地深嚴隔世塵金籙禎祥非是寶玉堂名號此方真玉堂之名從來未著格令今聖君親書玉堂之署四字為千古不朽之事自此名始真矣恩榮誰比煙霄客文彩長懸日月輪為報鼇宫主人道蓬萊全勝昔時春黃中以近離內署故不覺有此健羡之句伏覩禁林新成盛事輒思歌詠不避荒蕪給事中參知政事李沆上禁庭多士列華簮嚴樂輝光冠古今御筆騰驤題玉署宸章照耀詠詞林虛堂挂後傳千載翠琰刋成直萬金振復文明知聖作尊崇儒術見天心增修一院煙霞麗曲宴羣英雨露深自我昌朝為盛事鼇山髙峻重難尋伏蒙承旨學士特賜寵招慙非嘉客陪列仙於丹地觀盛事於玉堂御題禁署之名勢如飛動聖制大風之作鏗若宫商一時併耀於蓬瀛三體俄成於真草昔太宗之優待學士日預論思明皇之寵尚集賢時聞臨幸以今况昔異代同榮至謬亞冢卿獲司中祕啖牛心而不稱陪麈尾以何能謬銜樂聖之杯且乏娛賓之賦嗟歎不足歌詠輒興雖勞燥吻之冥搜終類繫轅之陋唱仰塵髙鑒聊抒下情吏部侍郎兼祕書監李至上昔陪羣彥在鼇山今日重來赴玳筵才向玉堂觀聖札又離瑶席覩宸篇二南絶唱人驚駭三體神蹤鳳折旋坐久庭柯移午影飲酣宫吹遞香煙吟求視草箋分寫醉假通中枕暫眠俗客不知仙禁近髙歌共樂太平年禁林宴會之什學士承旨中書舍人蘇易簡上雨晴禁署絶纎塵宴會名賢四海聞供職盡居清顯地崇儒同感聖明君翩然飛白璇題字煥若丹青翠琰文梓澤笙歌誠外物蘭亭詩酒不同羣少年已作瀛洲老他日終棲太華雲莫怪坐間全不飲心中和氣自醺醺學士左諫議大夫知制誥韓丕上鼇宫明麗倚春寒宴會羣仙喜縱觀聖作照臨新日月御書飛動集龍鸞綺談雅似聞天樂瓊液香勝飲露盤坐久杳同玄圃外吟餘飄若碧雲端演綸視草微才怯闕霈澤寬因想前賢倍知幸多云遭值太平難學士考功員外郎知制誥畢士安上好文英主古難齊寵重詞臣意勿低睿藻清新刋翠琰神蹤飛動在璇題藝籖許效蓬萊閣花檻容模罨畫溪樂聖朋儕開綺席愛君誠抱挂金閨買臣晚遇知多幸犬子端憂思轉稽天地恩私無以報只將兢慎對芝泥司封郎中知制誥柴成務上內署延賓宴玉堂紫闈深啓會琳琅雲霏寶額題宸翰金錯瑶編勒御章盤薦異羞羅彩翠盞傾醇醴湛清光栁當朱檻春先到日過花磚影漸長吟客盡容窺綺閣棲禽應許託雕梁歡榮共樂文明代惟願登歌頌聖皇起居舍人知制誥吕祐之上髙會蓬瀛振德音崇賢同慶湛恩深瑞融雲露飛宸翰榮下煙霄飾禁林鳳藻瓌竒清擊石龍文磨琢麗雕金詞臣喜適逢時願睿眷殊敦好士心華照北門張組繡祕逾東序敵球琳玉堂宴罷尤知幸御榜天章豈易尋右正言知制誥錢若水上一夜春風滿帝都禁林清曉宴簮裾玉堂乍到驚凡目金鎖徐開見御書承旨學士嚴以扃鐍鎖御書於玉堂之上四字驪龍爭夭矯兩篇瓊樹鬬扶疏詞臣此會人應羡聖主多才古不如日上花磚簾捲後栁遮鈴索雨晴初閣前吟罷先沈醉忘却西垣有直廬右正言知制誥王旦上喜綴真仙宴禁林玉堂新事好供吟天章刻石興風雅宸翰書牌耀古今勢逸奪回龍鳳迹調髙流入管絃音光凝玉斚瓊漿潤冷布花磚藥樹隂地貴每朝金殿近景清如到玉壺深得陪嘉會榮觀大虔效賡歌樂聖心右諫議大夫史館修撰楊徽之上星移嵗律應青陽得奉羣英步玉堂龍鳳雙飛觀御札雲霞五色詠天章禁林漸覺清風暖仙界元知白日長詔出芝泥封去潤朝回蓮燭賜來香二篇稱奬恩尤重萬國傳聞道更光何幸微才逢盛事願於史册紀餘芳右司諫史館修撰梁周翰上寶書驚絶耀天章飛白親題賜玉堂瑞彩上騰流素月朗河下注映丹牆鶴盤吳嶼雙翎健鵲顧雕陵巨翼長遊霧半收懸組練輕雲斜拂駐鸞皇墨池併獲三竒寶翠琰俱生五色光陪宴禁林知有幸叩頭遙祝萬年觴倉部員外郎直祕閣潘慎修上紅藥深嚴肅廣筵嘉招仍許厠羣仙忽窺宸翰雲龍動乍揭天辭日月懸散作楷模爭寶惜永刋金石共流傳况當枚馬從容地仍集班揚侍從賢敢竊休明為盛觀願陳風詠播薰絃不辭勝引承歡醉長洽升平億萬年翰林侍讀右正言吕文仲上青蔥溫樹非塵境鼇岫金鑾近日邊石壁天章垂雨露璇題宸翰動雲煙西垣賈馬徵詞客東觀蓬萊集列仙宴喜􅋳顔飛玉斚鏗鏘奮藻擘花箋唐虞盛化髙千古葵藿傾心祝萬年自顧薄才誠有愧不知何以奉羣賢翰林侍書行殿中侍御史王著上文明天子重詞臣聖製褒揚日月新宸翰特頒仙署額皇風先發玉堂春虬龍逸勢誠難伏鸞鶴回翔信得真齊武任誇非入妙漢章雖巧未通神匪惟衒耀鼇宫客兼是輝華鳳閣人幸接英儒同讚詠輒書狂斐繼清塵翰苑羣書卷七
