body:
  text: 翰苑羣書卷九宋洪遵編蘇耆次續翰林志先公自太平興國庚辰嵗首登上第不由館殿直升綸閣從釋褐凡七年召入翰苑先帝睠注隆厚垂欲大用者數矣以尚少但加承㫖之號以榮之凡八換炎涼方參預政事有唐以為榮滯相半不虚矣在玉堂日書詔之暇集近朝故事號續翰林志其末云後之制置新規俟他日别加編纂焉尋以中樞務繁晨趍夕返旋又出鎮穰下故未遂周序其事嗚呼先公遭時遇主騰㧞霄漢才名振赫非不大矣職位隆顯非不達矣而夀不登於強仕志未展於一時莫報寵光旋悲朝露豈使君臣盛美之事禁林榮耀之迹不傳於後世邪次子耆出宰烏程居多暇日因泣血編録附於志後目之曰次續翰林志云耳先公於丙戌嵗始入翰林時翰長宋公白副翰賈公黄中皆先達鉅儒同在鼇署公乃作古詩數百言序述疇昔遭逢之由二公亦以歌答之今悉附之於後宋即南宫座主也纔及七嵗遂為同列故其歌云疇昔聊為尺木階而今真是青雲友賈即嘗任補衮閱民田於澤郡時先公方在幼齡祖父攜而謁之仍以文為贄賈贈詩曰曲江願作先容客都醉春風上五雲十餘年更直内署於今朝野流為美談國家舊制郊祀之禮惟宣祖皇帝侑神作主公受詔攝禮儀使乃拜疏云太祖皇帝受命造宋垂於無窮不預嚴配恐乖天人之意仍唐永徽中髙祖太宗同配故事上優詔褒美朝廷韙之迄今以為定制焉公始撰翰林志成以獻上大恱特賜宸章兩篇皆奬飾褒美之㫖其後御批云詩意者因卿進續翰林志美居清華之地也尋刻石於玉堂之東序焉時傳本四出人得之者咸以為榮先帝以玉署之設其来尚矣但虚傳其號而無正名乃於紅絹上御書飛白四字題曰玉堂之署以賜焉鈿軸晶熒降從天上御香馥郁傳到人間遂捧歸私第以慶耀其親時祖母太夫人具命服焚香設拜而觀之喜歎之聲動於鄰里即命置於本院中擇日懸掛乃具扃鑰於玉堂之上其御札至今鎖之或學士上事及賜勅設即令開之焚香而觀焉自待詔院吏而下咸列賀於庭公曰自唐置學士来幾三百年今日方知貴矣即日詔宰輔暨兩制詞臣就院勅設宴帳之盛無如是時仍賦長韻詩一章以記其事其詩目曰禁林讌會集今附之於後有唐學士院深嚴非本院人不可遽入雖中使宣示及有文書必先動鈴索立於門外俟本院小判官出授訖授院使院使授學士自五代已来其制久廢公因召對言之上可其奏自是院内復置鈴索焉淳化中公方在宿直夜將及乙就枕已久忽鈴索聲動即中使賫御草書宋玉大言賦以賜公即具簮笏張燭望宸居再拜而發焉續有劄子云朕草宋玉大言以賜卿不識来朝因呈文書将来讀與卿及淩晨對敭方盡詳悉公乃自撰大言賦以進詞曰皇帝書白龍牋作大言賦賜玉堂臣易簡御筆煌煌雄詞洋洋瓌瑋博達不可備詳詔臣陞殿躬指其理且歎宋玉之竒怪也因伏而奏曰恨宋玉不與陛下同時帝曰噫何代無人焉卿為朕言之臣曰聖人興兮造成功登崑崙兮展升中崑崙南屬地居天地為席兮饗祖宗天起籟兮調笙鏞日烏月兎耀文明也參旗井鉞嚴武衞也執北斗兮奠𤣥酒也削西華兮為石䃭也飛雲涌霞騰燔燎也刳鯨腊鵬代鶼鰈也飛雷三發山神呼也流電三激爟火舉也禮載獻兮淳風還君百拜兮天神懽四時一周兮萬八千年太山融兮溟海乾圓盖穴兮方輿穿君王夀兮無窮焉時殿上皆呼萬嵗上覽之嘉歎再三賜大言賦名四句其序曰宋玉遇侯王則未足以為美易簡逢真主堪師法於後人兼賜卿大言賦名四句少年盛世兮為詞臣古徃今来兮有幾人首出文章兮居翰林儒名善守兮合縁寅已勒石於書閤之西序矣先是内院逼近禁闈地復狹窄前後書詔繁萃積於房廊多所損潤公乃於玉堂後廡建二書閣東西交映藻繪間飾自是文籍有附焉閤之上下悉命僧巨然畫煙嵐曉景以布之筆跡野逸效李成之作而又自成一家之妙唐制學士每有除拜他職必納光院錢以為公用自丞相而下各有差等五代以還其儀久闕公振舉而復之自是院中費用及待詔而下伏臘之資告足公入參之日首納百千上恩詔特令迴賜公嘗奏事歸院上即時宣召顧左右曰宣蘇某来及對敭而退上猶未起又曰宣當直學士来及再引對畢未及到㕔上又曰召承㫖来時雖處内署而兩地政事多所詢訪盖聖語有所未盡故一日凡三接見而三易其稱特眷注之深厚耳國朝舊制有殿前承㫖頗甚繁雜及公拜翰林承㫖上以其稱呼不别又惡其與清貴混淆詔改為三班奉職以避其稱也公嘗早朝省覲其母於堂上燭滅誤為門扉傷其額及引對上再三顧矚曰豈非因酒乎公再拜具以實對上曰待歸院續有藥去及移時中使至於金合内有藥一刀圭許其色㣲碧及生猪肉一臠禁中無猪肉盖令旋於屠家取之中人遽請偃息傅藥於上以肉貼之不食許掲去其肉痂隨而起宛如無傷盖神異之方也公一日在院内以水一斛試欹器焉上令中黄門偵知遽奏其事而莫辨其器及晚朝上曰卿在院中所玩得非欹器乎公初亦驚怛尋奏曰臣昔任官江左因而得之乃李氏義族收所作實欹器之遺象也上遽命取来乃於便殿躬自校試再三歎美之公乃進曰臣聞日中則昃月滿則虧器盈則覆物盛則衰願陛下持盈守成慎終如始固萬世基業天下幸甚上深加聽納因即獻之自後制度亦罕有傳者公久在禁林連典貢部自前南宫首薦及殿庭覆考試多所改易及公薦陳樞相堯叟孫紫微何一不揺動天下伏其知人寒畯之流牢籠殆盡雖退黜者曽無怨言場屋之間至今歌詠上以公飲酒過多恐成疾患因乾明聖節宣近御座委曲勸勉至於再三凡移數刻左右大臣莫不聳聴公感戴恩恵但垂泣再拜而已来日具状稱謝上於表後御書批答云覽卿之謝過表章其辭也深合朕意卿擢登髙級盛美儒林敗徳之名克先為誡知非能改於不二諸事豈假再三手札不多賜蘇某凡奏状縫上皆御寶印之續降一劄子云昨日賜卿批答怱速今日始捻舊本子看誤使一辭字卿改却著公即具状謝仍面奏辭字從舌乃是正文并檢虞監書者辭字進呈上大恱曰非卿博識朕以為誤矣上嘗御便殿案上有御書一紙乃銷金紙飛白一香者公乃拜乞上雖許而未即賜坐間吕宫師䝉正因奏事見之又乞上曰適已許賜蘇某矣遽命公取之公袖以致謝左右無不健羡焉公與襄陵賈公内直禁署嘗相謂曰今兩地大僚請酒至多而罕有相遺者因各有不平之氣未幾賈公入參大政又數月蔑聞有濃醪之贈公因飛一絶以贈之憶昔當初直禁林共嗟難得酒如金此時寂寞垂簾坐惆悵無人話此心賈公見之方悟因大笑封送酒歴恣其所請公乃預請數月幾近百壺好事者即日傳於都下草麻潤筆自隋唐已来皆有之鄭譯隋文時自隆州刺史復國公爵令李徳林作詔髙熲戱之曰筆頭乾譯答曰出為方伯杖䇿而歸不得一錢何以潤筆近朝武臣移鎮及大僚除拜因循多不送遺先帝以公久在内署慮經費有闕特定草麻例物朝謝日命閤門督之既得因以書進呈自是無敢有闕者迄今以為定制公嘗劇飲寝於直廬夜將分中人宣召遽起以水沃面具簮笏以朝而方醉中乃賜坐訪以外事應對如流畧無舛誤仍令草王密使名顯駮麻及袖歸院晨並不之記上亦不覺其醉自以為神助聞者莫不驚異焉公書詔之暇日飲醇酎上御草書戒酒勸酒詩二章以賜仍令與祖母讀之何人肯立杜康廟又拉劉伶在畔頭願得黄金千萬鋌一時送與酒家休又㡬醖香醪一曲歌本圖閒放養天和後人不會先賢意破國亡家事極多儤直之制自五代以還頗亦湮廢雖有舊規而罕能遵守公自始入洎起皆力行之亦未嘗借請同院代直自是羣官亦無敢隳其例者因酌楊八座昭儉鳳閣儤直例勒石龕於玉堂之東北隅凡此數事悉先公在儒林之殊迹也耆是時方在幼齡十不記其一二慮年代浸逺徽烈無聞因以編修刋於緗素一則表神宗優賢之異二則彰先公遭遇之由垂示方来諒亦無愧時聖上幸亳之嵗孟春月書翰苑羣書卷九
