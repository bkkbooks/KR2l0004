body:
  text: 翰苑羣書卷三宋洪遵編韋處厚翰林學士記魏晉已後典綜機密政本中書詔命辭訓皆必由焉唐有天下因襲前代爰自武德時有密命則溫大雅魏徵李百藥岑文本之屬視草禁中乾封則劉懿之周思茂范履氷之倫秉筆便坐自此始號北門學士皆自外召入未列祕書𤣥宗開廣視聽搜延俊賢始命張說陸堅張九齡徐安貞輩待詔翰林厥後錫以學士之稱蓋由德成而上與夫數術曲藝禮有所異也逮自至德台輔伊說之命將壇出車之誥霈洽天壤之澤導揚顧命之重議不及中書矣尺一旁午章奏藂至指縱命中之略謀猷幃幄之祕隂隲造化嘉猷密勿制萌乎將然事搆乎無形皆歸元后而播興運循名跡者莫窺其轍想風彩者罔究其端誰然誰否無得而稱矣貞元中由此而居輔弼者十有二焉元和中由此而膺大用者十有六焉近日丞相府不由內庭者斷國論宰法度雖有利器長材未免缺折掉撓建中以來簡拔尤重故必密如孔光博如延州文如卿雲學如歆向器如黃顔直如史魚然後得中第士之遊心處已景行於六如者而又飾之以潔圭璋之行貫金石之誠雖潛聲匿迹莫能脫口漢時始置尚書郎五人平天下奏議分直建禮含香握蘭居錦帳食大官則今之翰林名異而實同也時論以為登玉清翔紫霄豈蓬山瀛洲而足喻乎齊桓納廏人編棧之說以為直木傅直則曲無由至曲木傅曲則直無由至後之君子戴明聖協盛時推廏人之規矩乎引賢使如貫珠駢璧則瑕瑜不雜矣內給事李常暉內謁者將王士玖並掌院事近乎十年與直徇公之議聆於中書舍人杜元穎兵部侍郎沈傳師洎諸學士皆涉歷嵗久備乎前聞者也李常暉以北閣舊記室别堵殊義非貫通改於前㕔時以為便上聖紹復墜典留神太古處厚與司勳郎中路隋職參侍講通籍近署紀述之事前託沈傳師沈公以為稱善之在已不若使其在人讓于處厚固陋無以辭時皇帝統臨四海之初元也翰苑羣書卷三
