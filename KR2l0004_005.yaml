  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0004_WYG_005-1a, image: WYG0595/WYG0595-0356c.png}
body:
  text: 翰苑羣書卷五宋洪遵編翰林學士院舊規按閣下本作李愚唐志并崇文總目作楊鉅今以史為正初入儤直例諸行尚書三十五左右丞侍郎四十常侍諫議給事舍人四十五諸官知制誥五十如諫議知郎四十五太常少卿諸行郎中五十五諸行員外起居侍御史六十殿中補闕六十五監察拾遺太常博士七十五四赤令雜人入一百未升朝一百二十白身一百四十前資各加五直初入轉官三十直已後每轉一直改服色一直初知制誥三直已上遇本直更儤一日每新人入五儤三直一㸃自後兩直一㸃兩人齊入即無㸃初入亦須酌量都儤直數足三直多少草麻例新入學士須見舊學士草麻了方合當制已後即據草制逺處即當制草第一第三更有堆此並以命官髙卑不次不繫學士官位如當制日遇將相名姓與私諱同者即請同直替草逺諱不在此限草書詔例唐天復三年七月二十一日學士栁璨准宣於思政殿對便令到院宣示待詔自今後寫勅書後面不得留空紙號簿例不得有行坐人字及諸凶惡文字及廟諱官諱事承㫖厯並先賢生狀若干道遣書詔事休上厯及署名並記官位次第不得記私事應入内草文書只言某乙准宣入内不得言所草文書仍須直書并州府去處以防宣索判公廨例在院最小學士判書詔様凡外藩奏事專使若是都押衙都虞候即言都押衙都虞候某乙至其餘一例言軍将某乙若是幕府官即一例言判官某乙至如是步奏官即言奏事官某乙至若是進奏官即空言省所奏如是自奏事回書即言具悉若因人奏事賜書詔即不言具悉詔内呼卿後定故兹詔示想宜知悉急詔便言故茲急詔密詔便言故茲密詔已下語及時候待詔院有例書内呼汝後言故茲示諭如賜諸蕃鎮将校及内外八鎮将校書則書頭具本職名賜諸王詔如是兄叔不呼名卿處改為王賜國舅詔官敕某官舅呼卿處改呼舅如是國舅駙馬不繫官位髙卑並賜詔近准中書記事國舅詔内捨族呼名諸王新婦只言某國夫人某氏若中書覆状内有云中書門下行敕處分其詔語不得與覆状詞同末云餘從别敕處分或命官宣示亦云今授某官已後從别敕處分賜節度使及三軍将士敕書云敕某乙三兩聯便云将士等及奨将士三故具言宣慰事意其除授節使或發兵尾云專遣某乙若賜官告即云專官使告使例云等徃彼宣賜下云便令慰諭想宜知悉時候卿與將士各得平安好參佐官僧道耆夀百姓並存問之遣書指不多及非節察不同參佐出師在外不問僧道已下祠祭祈賽例南郊維年月日嗣天子臣署敢昭告於昊天上帝之靈北郊嗣天子臣署敢昭告於五帝嗣天子臣署敢昭告於青帝之靈諸帝各依方色太廟稱孝子孝孫皇帝臣署敢昭告於云云及廟號並依前項亦云敢昭告於太社太稷各一本稱天子署敢昭告於太社之靈已上後尾並云伏惟尚饗五嶽維年月日皇帝署遣某官某乙致祭於祈禱即云告賽謝即云昭賽於某王尾只云尚饗自新朝署各應例不署東嶽天齊王中嶽中天王西嶽金天王南嶽司天王北嶽安天王四瀆惟不御署其餘並同五嶽江瀆廣源公河瀆靈源公淮瀆廣潤公濟瀆清源公九宫貴神太一天一攝提咸池軒轅招揺天符青龍太隂已上並云年月朔嗣天子不稱臣謹遣某官某祭於某貴神之靈尚饗風師雷師雨師諸星帝北郊岳鎮海瀆惟此一處皇祭其餘並同一板風神已下只云皇帝遣某致祭某之神尚饗已上並是舊例為水旱災異祈禱處其諸色神祠特救賽而臨臨時酌量輕重發遣道門青詞例維某年月嵗次某月朔某日辰嗣皇帝臣署謹差某銜威儀某大師賜紫某處奉依科儀修建某道場幾日謹稽首上啓虚無自然元始天尊太上道君太上老君三清衆聖十極靈仙天地水三官五嶽衆官三十六部衆經三界官屬宫中大法師一切衆靈臣聞云云尾云謹詞天皇大帝表亦使表紙維某年嵗次某月朔某日嗣天子署謹醮告於天皇大帝伏以北極尊神已下醮下使白紙者維年月同正嗣皇帝署謹致醮於北極尊神及日月七耀二十八宿諸位星辰等伏以云云尾尚饗祭諸色神祇文使白紙與北極文同時發遣維年月日皇帝遣隂陽官某乙致祭於五嶽四瀆天曺地府諸龍等稱朕云云尾尚饗祭本命元神維年月日皇帝遣隂陽官某乙致祭於本命元神稱朕云云尚饗恩賜近例不録皇帝遷歸西都應岳鎮海瀆名山大川及州府靈迹封崇神祠祭告中嶽嵩山中天王東嶽岱山天齊王兖州界西嶽華山金天王在華州北嶽恒山安天王在定州界南嶽衡山司天王在衡州界北鎮醫無閭山廣寧公在營州界西鎮吳山感徳公在隴州界東鎮沂山東安公在沂州界南鎮會稽山永興公在越州界東海廣徳王在莱州界西海廣潤王在河中界南海寧邦王在廣州界北海廣澤王在孟州界東瀆大淮廣潤公在泌州界西瀆大河靈源公在河府界北瀆大濟清源公在孟州界南瀆大江廣源公在廣都府界右前件一十七處准中書覆狀録到勘同待詔院當院伏見舊例答蕃書并使紙及寶函等事例新羅渤海書頭云勅某國云王著姓名尾云卿比平安好遣書指不多及使五色金花白背紙次寶函封使印黠戛斯書使紙并寶函與新羅一般書頭云勅黠戛斯著姓名尾云卿比平安好遣書指不多及使印回鶻天睦可汗書頭云皇帝舅敬問回鶻天睦可汗外甥尾云想宜知悉時候卿比平安好将相及部族男女兼存問之下同前使印如冊可汗即首云勅某王子外甥尾云問部族男女等契丹書頭云勅契丹王阿保機尾云想宜知悉時候卿比平安好下同黠戛斯也舊使黄麻紙平使印自為朝宣令使五色牋紙并使印及次寶鈿函封自僭稱神號奏事多繫軍機所賜中書内改例從權院中無様䍧牱書頭云勅䍧牱著姓名尾云想宜知悉時候卿比好否遣書不多及五色牋紙不使印退渾党項蕃使首領書頭云勅與䍧牱一般使黄麻紙不使印賜國舅詔著姓名呼卿新例不著姓名諸州刺史書呼汝南詔驃信書頭云皇帝舅敬問驃信外甥尾與回鶻書一般至不多及後具四相銜名書勅一般此一件是故待詔李部云僖宗在西川日曽行此書使白紙亦使印光院例承㫖尚書左丞知制誥陸扆撰詞牓於玉堂貴調金戛解視草之煩勞出擁碧幢釋援毫之羇束固人臣之極致亦翰墨之殊榮至於察風俗於一方掌貨泉於三使其為書也抑又次焉各率金錢以光玉署列之如右將相各三百千使相五百千觀察使三百千度支使二百千鹽鐵二百千户部一百千制下一日送入院充公用對見儀大殿對蕃客承㫖殿下祝聖徳蹈舞訖喚上殿各奏事如其日中候舞訖便出行例如初入上殿更曲謝殿上並不蹈舞先於殿西北隅立候客省奏某乙等到殿上云喚客省使遞聲云喚即鞠躬髙唱喏趨至庭前立即拜拜即說承㫖致詞又拜拜訖舞蹈舞蹈訖又拜如中謝便於本立處拜及舞蹈更不歸行小殿中謝並不喚上便出如賜服色却喚宣了拜且出服訖却入致詞謝非時詔及樓上祇候並拜了稱聖躬萬福便止不别致詞五月一日及大殿稱慶賀正至立仗准臺牒外赴班即立於中書相公之後左省班前自為一班如有使相後進並同兩省回於中書見宰相憇止並在客人院内應正至五月一日如不坐並齊入院進名奉賀具銜㫖銜某乙等奉賀五月一日云起居大忌並齊入奉進名奉慰沿革大順二年十月宣每進畫詔書别録小字本首留内承為定式乾寧三年加階爵止於進狀不中謝舊例宰相及使相官告並使五色背綾金花紙節度使並使白綾金花紙命婦即金花羅紙乾寧二年十月李鋋自黔南節相改授京兆尹兩度諮報中書使白綾紙十一月渤海國王大璋諧勅書院中稱加官合是中書意諮報中書乾寧三年承㫖牓子凡中書覆状奉錢物如賜詔徴促但畧言色額其數目不在言但云並從别勅處分中書覆狀如云中書門下行勅其詔語不得與覆狀語同每降制抄小字録一本送樞密院學士請假應學士請假七日一度奏經三奏即自奏即自進章表陳某乙乾寧四年二月十四日冊皇太子出就班賀禮畢又上表賀并上皇太子牋云某等叩頭伏承某伏惟殿下云云謹奉牋陳賀某等叩頭謹牋年月日承㫖銜某等上牋封題云具銜某等上牋翰苑羣書卷五
