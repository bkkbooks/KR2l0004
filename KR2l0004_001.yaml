body:
  text: 翰苑羣書卷一宋洪遵編李肇翰林志昔宋昌有言曰所言公公言之所言私王者無私夫翰林為樞機宥密之地有所慎者事之㣲也若制置任用則非王者之私漢制尚書郎主作文書起草更直於建禮門内臺給青縑白綾或以錦被帷帳氊褥畫通中枕大官供食湯官供餅餌五熟果五日一美食下天子一等建禮門内得神仙門神仙門内得光明殿神仙殿自門下省中書省盖比今翰林之制略同而所掌輕也漢武帝時嚴助朱買臣吾丘夀王司馬相如東方朔枚臯之徒皆在左右是時朝廷多事中外論難大臣數詘亦其事也唐興太宗始於秦王府開文學館擢房𤣥齡杜如晦一十八人皆以本官兼學士給五品珍膳分為三番更直宿於閣下討論墳典時人謂之登瀛洲貞觀初置𢎞文館學士聽朝之隙引入大内殿講論文義商較時政或夜分而罷至𤣥宗置麗正殿學士名儒大臣皆在其中後改為集賢殿亦草書詔至翰林置學士集賢書詔乃罷初國朝修陳故事有中書舍人六員専掌詔誥雖曰禁省猶非密切故温大雅魏徵李百藥岑文本褚遂良許敬宗上官儀時召草制未有名號乾封已後始曰北門學士劉懿之劉禕之周思茂元萬頃范履氷為之則天朝蘇味道韋承慶其後上官昭容獨掌其事睿宗則蘇稷賈膺福崔湜𤣥宗初改為翰林待詔張說陸堅張九齡徐安貞相繼為之改為翰林供奉開元二十六年劉光謹張垍乃為學士始别建學士院於翰林院之南又有韓紘閻伯輿孟匡朝陳兼李白蔣鎮在舊翰林院雖有其名不職其事至徳宗已後翰林始兼學士之名代宗時李泌為學士而今壁記不列名氏盖以不職事之故也按六典中書掌詔㫖制敕璽書冊命皆案典故起草進書其禁有四一曰漏洩二曰稽緩三曰遺失四曰忘誤所以重王命也制敕既行有誤則奏而正之凡王言之制有七一曰冊書立后建嫡封樹藩屏寵命尊賢臨軒備禮則用之二曰制書行大典賞罰授大官爵釐革舊政赦宥降虜則用之三曰慰勞制書褒贊賢能勸勉遣勞則用之四曰發白敕増減官員廢置州縣徵兵發馬除免官爵授六品已下官處流已上罪並用之五曰敕㫖為百司承㫖而為程式奏事請施行者六曰論事敕書慰論公卿誡約臣下則用之七曰敕牒隨事承㫖不易舊典則用之又答疏於王公則用皇帝行寶勞来勲賢則用皇帝之寶徵召臣下則用皇帝信寶答四夷書則用天子行寶撫慰蠻夷則用天子之寶發蕃國兵則用天子信寶並甲令之定制也近朝大事直出中禁不由兩省不用六寶並從權也元和初置書詔印學士院主之凡赦書徳音立后建儲大誅討免三公宰相命将曰制並用白麻紙不用印雙日起早候閣門鑰入而後進書隻日百寮立班於宣政殿樞密使引案自東上閣門出若謫宰相則付通事舍人矩步而宣之機務要速亦用雙日甚者雖休暇追朝而出之凡賜與徵召宣索處分曰詔用白藤紙凡慰軍旅用黄麻紙並印凡批答表疏不用印凡太清宫道觀薦告詞文用青藤紙朱字謂之青詞凡諸陵薦告上表内道觀歎道文並用白麻紙雜詞祭文禁軍號並進本凡将相告身用金花五色綾紙所司印凡吐蕃贊普書及别録用金花五色綾紙上白檀香木真珠瑟瑟鈿函銀鏁回紇可汗新羅渤海王書及别録並用金花五色綾紙次白檀香木瑟瑟函銀鏁諸蕃軍長吐蕃宰相回紇内外宰相摩尼已下書及别録並用五色麻紙紫檀木鈿函銀鏁並不用印南詔及大将軍清平官書用黄麻紙出付中書奉行却送院封函與回紇同凡畫而不行者藏之函而不用者納之凡參議奏論撰述注釋無定名奏復無晝夜凡徵天下草澤之士臨軒䇿試則議科設問覆定與奪凡受宣有堂歴日記有承㫖簿記大扺四者之禁無殊而漏泄之禁為急天寶十二載安禄山来朝𤣥宗欲加同中書門下平章事命張垍草制不行及其去也怏怏滋甚楊國忠曰此垍告之也遂貶盧溪郡司馬兄均建安郡太守弟埱宜春郡司馬徳宗雅尚文學注意是選乗輿每幸學士院顧問錫賚無所不至御饌珍肴輟而賜之又嘗召對於浴堂移院於金鑾殿對御起草詩賦唱和或旬日不出吳通微昆季同時擢用與陸贄争恩不叶甚於水火天下醜之貞元三年贄上疏曰伏詳令式及國朝典故凡有詔令令由於中書如或墨制施行所司不須承受盖所以示王者無私之義為國家不易之規貞觀中有學士一十八人太宗聽朝之餘但與講論墳籍時務得失悉不相干實録之中具載其事𤣥宗末方置翰林張垍因縁國親特承寵遇當時之議以為非宜然止於唱和文章批答表疏其於樞密輒不預知肅宗在靈武鳳翔事多草創權宜濟急遂破舊章翰林之中始掌書詔因循未革以至於今嵗月滋深漸逾職分頃者物議尤所不平皆云學士是天子私人侵敗綱紀致使聖代虧至公之體宰臣有備位之名陛下若俯順人情大革前弊凡在詔敕悉歸中書逺近聞之必稱至當若未能變改且欲因循則學士年月較深稍稍替換一者謗議不積二者氣力不衰君臣之間庻全終始事關國體不合不言疏奏不納雖徵據錯謬然識者以為知言貞元末其任益重時人謂之内相而上多疑忌動必拘防有守官十三考而不遷故當時言内職者多榮滯相半及順宗不豫儲位未立王叔文起於非類竊學士之名内連牛美人李忠言外結姦黨取兵柄弄神器天下震駭是時鄭絪為内庭之老首定大計今上即位授絪中書侍郎平章事初姜公輔行在命相乃就第而拜之至李吉甫除中書侍郎平章事適與裴垍同直垍草吉甫制吉甫草武元衡制垂簾揮翰兩不相知至暮吉甫有歎惋之聲垍終不言書麻尾之後乃相慶賀禮絶之敬生於座中及明院中使學士送至銀臺門而相府官吏候於門外禁署之盛未之有也凡學士無定員皆以他官充下自校書郎上及諸曺尚書皆為之所入與班行絶跡不拘本司不繫朝謁常參官二周為滿嵗則遷知制誥一周嵗為遷官則奏就本司判記上月日北省官宰相送南省官給舍丞郎送上興元元年勅翰林學士朝服序班宜准諸司官知制誥例凡初遷者中書門下召令右銀臺門候㫖其日入院試制書答共三首詩一首自張仲素後加賦一首試畢封進可者翌日受宣乃定事下中書門下於麟徳殿候對本院賜宴營幕使宿設帳幕圖褥尚食供饌酒坊使供美酒是為勅設序立拜恩訖候就宴又賜衣一副絹三十疋飛龍司借馬一疋旬日人進文一軸内庫給青綺錦被青綺方青綾單帕漆通中枕銅鏡漆奩象篦大小象梳漆箱銅挲羅銅觜椀紫絲履白布手巾畫木架牀鑪銅案席氊褥之類畢備内諸司供膳飲之物主膳四人掌之内園官一户三人以供使令其所乗馬送迎於擗仗門内横門之西度支月給手力資四人人錢三千五百四品已上加一人每嵗内賜春服物三十疋暑服三十疋緜七屯寒食節料物三十疋酒飴杏酪粥屑飲啖清明火二社蒸􅠑端午衣一副金花銀器一事百索一軸青團鏤竹大扇一柄角糉三服粆蜜重陽酒餹糕粉冬至嵗酒兎野雞其餘時果新茗𤓰新厯是為經制直日就頒授下直就第賜之凡内宴坐次宰相坐居一品班之上别賜酒食珍果與宰相同賜帛二十疋金花銀器一事貞元四年敕晦日上已重陽三節百寮宴樂翰林學士每節賜錢一百千其日奏選勝而會賜酒脯茶果明年廢晦日置中和節宴樂如之非凶年旱嵗兵革則每嵗為常凡正冬至不受朝俱入進名奉賀大忌進名奉慰其日尚食供素饌賜茶十串凡郊廟大禮乗輿行幸皆設幕次於御幄之側侍從親近人臣第一御含元殿丹鳳樓則二人於宫中乗馬引駕出殿門徐出就班大慶賀則俱出就班凡當直之次自給舍丞郎入者三直無儤自起居御史郎官入五直一儤其餘雜入者十直三儤新遷官一直報儤名於次之中減半著為别條例題於北壁之西閤凡交直候内朝之退不過辰已入者先之出者後之直者疏數視人之衆寡事之勞逸隨時之動靜凡節國忌授衣二分旬假之令不霑有不時而集併夜而宿者或内務不至外喧已寂可以探窮理性養浩然之氣故前輩傳楞伽經一本函在屋壁每下直出門相謔謂之小三昩出銀臺乗馬謂之大三昧如釋氏之去纒縳而自在也北㕔前階有花磚道冬中日及五磚為入直之候李程性懶好晩入恒過八磚乃至衆呼為八磚學士元和已後院長一人别敕承㫖或密受顧問獨召對敭居北壁之東閤號為承㫖閤子其屋棟别列名焉故事駕在大内即於明福門置院駕在興慶宫則於金明門内置院今在右銀臺之北第一門向闕牓曰翰林之門其制髙大重複號為北門入門直西為學士院即開元二十六年所置也引鈴於外惟宣事入其北門為翰林院又北為少陽院東屋三院西廂之結麟樓南西並禁軍署有髙品使二人知院事每日晩執事於思政殿退而傳㫖小使衣緑黄青者逮至十人更番守曺南㕔五間本學士駙馬都尉張垍飾為公主堂今東西間前架髙品使居之中架為蔵書南庫西三間前架中三洞各設榻受制㫖印書詔二時會食之所四壁列制敕條例名數其中使置博局一印櫃中間為北一户架東西各二間學士居壁之出北門横屋六間當北㕔通廊東西二間為藏書北庫其二庫書各有録約八千卷小使主之西三間書官居之號曰待制北㕔五間東一間是承㫖閤子並學士雜處之題記名氏於壁者自吕向始建中已後年月遷換乃為周悉南北二㕔皆有懸鈴以示呼召前庭之南横屋七間小使居之分主案牘詔草紙筆之類又西南為髙品使之馬廏北為竇庫之北小板廊抵於北㕔西舍之南其一門待詔戴小平嘗處其中死而復生因敞為南向之宇畫山水樹石號為畫堂次二間貯逺嵗詔草及制舉詞䇿又北逥而東並待詔居之又東盡於東垣為典主堂待詔之職執筆硯以俟書寫多至五六員其選以能不以地故未嘗用士人自王伾得志優給頗厚率三嵗一轉官有至四品登朝者虚廊曲壁多畫怪石松屋北㕔之西南小樓王涯率人為之院内古槐松玉蘂藥樹柿子木𤓰菴羅峘山桃李杏櫻桃紫薔薇辛夷蒲萄冬青玫瑰淩霄牡丹山丹芍藥石竹紫花蕪菁青菊當陸茙葵萱草紫苑署學士至者雜植其間殆至繁隘元和十二年肇自監察御史入明年四月改左補闕依舊職守中書舍人張仲素祠部郎中知制誥叚文昌司勲員外郎杜元穎司門員外郎沈傳師在焉是時睿聖文武皇帝裂海岱十二州為三道之嵗時以居翰苑皆謂凌玉清遡紫霄豈止於登瀛州哉亦曰登玉署玉堂焉翰苑羣書卷一
