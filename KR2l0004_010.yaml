body:
  text: 翰苑羣書卷十宋洪遵編學士年表自建隆至治平建隆元陶榖正月自翰林學士承㫖吏部侍郎遷禮部尚書依前充職竇儼正月自翰林學士中書舍人遷禮部侍郎依前充職六月卒王著正月自翰林學士金部郎中為中書舍人依前充職李昉正月自起復翰林學士屯田郎中遷中書舍人依前充職二陶榖王著李昉三陶穀王著李昉七月遷給事中罷扈䝉七月以中書舍人史館修撰拜乾徳元陶穀王著員月責比部外郎罷扈䝉十月責左贊善大夫罷竇儀十月以工部尚書拜二陶穀竇儀三陶穀竇儀歐陽迥八月以左散騎常侍拜四陶穀竇儀十一月卒歐陽迥五陶穀歐陽迥開寶元陶穀歐陽迥二陶穀歐陽迥盧多遜郎月以兵部員外知制誥直院三陶穀十二月卒歐陽迥盧多遜四歐陽迥六月以本官分司兩京罷盧多遜十二月拜學士五盧多遜六盧多遜九月以中書舍人拜月除參知政事張澹四月以左補闕知制誥權直院七張澹六月卒八九太平興國元湯恱十一月自太子少詹事為直院徐鉉十一月自太子率更令為直院二湯恱徐鉉扈䝉正月以中書舍人復拜三湯恱徐鉉扈䝉四湯恱九月遷光禄卿罷徐鉉扈䝉五徐鉉扈䝉六徐鉉扈䝉七徐鉉扈䝉八徐鉉六月遷左散騎常侍罷扈䝉李穆五月以中書舍人拜承㫖十一月除參知政事宋白五月以中書舍人拜承㫖賈黄中五月以駕部員外郎知制誥為司封郎中拜學士吕䝉正五月以左補闕知制誥為都官郎中拜學士十一月除參知政事李至五月以左補闕知制誥為比部郎中拜學士十一月除參知政事雍熈元扈䝉宋白賈黄中二扈䝉部月遷工尚書罷宋白蘇易簡賈黄中三宋白賈黄中蘇易簡四宋白賈黄中蘇易簡端拱元宋白賈黄中蘇易簡二宋白賈黄中蘇易簡李沆三月以職方員外郎知制誥拜淳化元宋白賈黄中蘇易簡李沆二宋白九月責保軍司馬罷賈黄中九月除參知政事蘇易簡九月遷中書舍人承㫖李沆九月除參知政事韓丕十月以左諫議大夫拜畢士安十一月以考功員外郎知制誥拜三蘇易簡韓丕畢士安四蘇易簡十一月除參知政事韓丕五月以本官罷畢士安五月以右諫議大夫知昇州罷張洎五月以左諫議大夫史館修撰為中書舍人拜錢若水五月以屯田員外郎知制誥為職方員外郎拜五張洎錢若水至道元張洎四月除參知政事錢若水正月除同知樞密院宋湜正月以職方員外郎知制誥拜王禹偁正月以禮部員外郎知制誥拜五月以工部郎中知滁州罷宋白四月以禮部侍郎復為承㫖二宋湜宋白三宋湜宋白楊礪八月以給事中拜王旦八月以中書舍人拜咸平元宋湜十月除樞密副使宋白楊礪二月除樞密副使王旦二宋白王旦二月除同知樞密院三宋白梁周翰五月以駕部郎中知制誥拜師頏五月以刑部郎中知制誥拜朱昂闕月以吏部郎中知制誥拜王欽若闕月以左正言知制誥拜四宋白梁周翰師頏朱昂五月以工部侍郎致仕王欽若四月除參知政事五宋白梁周翰師頏八月卒六宋白梁周翰景徳元宋白梁周翰趙安仁七月以左正言知制誥拜二宋白五月遷刑部尚書集賢院學士罷梁周翰趙安仁二月除參知政事晁迥五月以起復左諫議大夫拜李宗諤五月以起居舍人知制誥拜三晁迥李宗諤楊億十一月以左司諫知制誥拜四晁迥李宗諤楊億大中祥符元晁迥李宗諤楊億二晁迥李宗諤楊億三晁迥李宗諤楊億四晁迥李宗諤楊億五晁迥李宗諤楊億六晁迥李宗諤五月卒楊億六月以太常少卿分司西京罷陳彭年六月以龍圖閣直學士左諫議大夫拜李維六月以左司郎中知制誥拜王曽六月以主客郎中知制誥拜七晁迥陳彭年李維王曽八晁迥陳彭年李維王曽九晁迥陳彭年九月除參知政事李維王曽九月除參知政事李迪八月以陜西都轉運使集賢院學士拜天禧元晁迥李維李迪九月除參知政事二晁迥十一月遷承㫖李維五月以户部侍郎集賢院學士罷錢惟演正月以工部侍郎拜盛度十一月以户部侍郎知制誥拜三晁迥錢惟演盛度四晁迥四月以工部侍郎集賢院學士判西京留臺罷錢惟演八月除樞密副使盛度七月責知光州罷楊億四月以起復工部侍郎復拜十二月卒劉筠八月以兵部員外郎知制誥拜晏殊八月以户部員外郎知制誥拜五劉筠正月以右諫議大夫知廬州罷晏殊李諮正月以户部員外郎知制誥拜李維正月復拜承㫖乾興元晏殊李諮李維宋綬九月以户部郎中知制誥劉筠八月以給事中復拜十一月除御史中丞罷天聖元晏殊李諮李維二晏殊李諮李維三晏殊十一月除樞密副使李諮九月除樞密直學士知洪州罷李維宋綬四月拜錢易十月以左司郎中知制誥拜四李維三月改相州觀察使罷宋綬錢易正月卒夏竦二月以起復户部郎中知制誥拜蔡齊五月以起居舍人知制誥拜章得象五月以兵部郎中知制誥拜五宋綬夏竦三月以右諫議大夫除樞密副使蔡齊章得象陳堯咨二月以龍圖閣學士工部侍郎權知開封府拜八月除宿州觀察使罷六宋綬蔡齊七月除禮部侍郎龍圖學士知河南府罷章得象馮元九月以龍圖閣學士兼侍講學士禮部郎中同修國史拜陳堯佐九月以樞密直學士左諫議大夫權知開封府拜七宋綬七月罷章得象馮元陳堯佐三月除樞密副使八宋綬四月復拜章得象馮元徐奭四月以禮部郎中知制誥拜九月卒九宋綬十月以龍圖學士知應天府罷章得象馮元明道元章得象馮元二章得象馮元景祐元章得象石中立正月以給事中知制誥拜張觀正月以刑部郎中知制誥拜二章得象石中立張觀三章得象十二月除同知樞密院石中立三月除參知政事張觀二月除給事中御史中丞罷丁度三月以刑部郎中知制誥拜晁宗慤三月以起復刑部郎中知制誥拜四丁度晁宗慤胥偃閏四月以工部郎中知制誥拜李淑閏四月以禮部員外郎知制誥拜寶元元丁度晁宗慤胥偃李淑三月除侍讀學士罷宋庠三月以刑部員外郎知制誥拜二丁度晁宗慤胥偃八月卒宋庠十一月除左諫議大夫參知政事王舉正八月以兵部郎中知制誥拜栁植八月以工部郎中知制誥知杭州拜十一月以左諫議大夫除權御史中丞罷康定元丁度晁宗慤九月除左諫議大夫參知政事王舉正王堯臣正月以左司諫知制誥拜慶厯元丁度闕月遷承㫖王舉正五月除左諫議大夫參知政事王堯臣闕聶冠卿四月以兵部郎中知制誥拜王拱辰五月以左正言知制誥拜蘇紳五月以刑部員外郎知制誥拜二丁度王堯臣聶冠卿九月卒王拱辰三月以右諫議大夫權御史中丞罷蘇紳吴育十月以起居舍人知制誥拜富弼十月以左正言知制誥拜固辭罷三丁度王堯臣蘇紳七月除龍圖閣學士知揚州罷吴育葉清臣闕月以龍圖閣直學士禮部郎中拜宋祁四丁度王堯臣吴育葉清臣宋祁五丁度四月以工部侍郎除樞密副使王堯臣正月遷承㫖吳育正月以右諫議大夫除樞密副使葉清臣十一月除翰林侍讀學士知邠州罷宋祁二月以翰林侍讀學士兼龍圖閣學士罷孫抃二月以起居舍人知制誥拜張方平二月以右正言知制誥拜梁適十一月以樞密直學士禮部郎中知延州拜是月罷為翰林學士知澶州蘇紳十月以龍圖閣學士禮部郎中復拜六王堯臣孫抃張方平正月以右諫議大夫權御史中丞罷十一月復拜楊察正月以右正言知制誥拜七王堯臣孫抃張方平八月知滁州罷楊察四月以右諫議大夫權御史中丞罷葉清臣四月復拜彭乗三月以工部郎中知制誥拜錢明逸三月以右諫議大夫知制誥拜八王堯臣孫抃葉清臣彭乗錢明逸趙槩十二月以刑部郎中知制誥拜楊偉十二月以刑部郎中知制誥拜宋祁六月復拜十月知許州罷皇祐元王堯臣孫抃葉清臣三月以翰林侍讀學士知河陽罷彭乗九月卒錢明逸四月除龍圖閣學士知蔡州罷趙槩楊偉二王堯臣孫抃趙槩楊偉嵇穎八月以刑部員外郎知制誥拜九月卒三王堯臣十月除樞密副使孫抃趙槩楊偉曽公亮四月以刑部郎中知制誥拜田况十二月除龍圖閣學士給事中權三司使罷四孫抃趙槩楊偉曽公亮田况五孫抃七月以右諫議大夫權御史中丞罷趙槩曽公亮田况九月除禮部侍郎三司使罷胡宿五月以兵部員外郎知制誥拜至和元趙槩楊偉曽公亮九月除端明殿學士集賢殿修撰知鄭州罷胡宿歐陽修八月以龍圖閣學士吏部郎中拜吕溱九月以起居舍人知制誥拜王洙九月以工部郎中知制誥拜二趙槩楊偉胡宿歐陽修六月以侍讀學士集賢殿修撰知蔡州罷七月復拜吕溱二月以翰林侍讀學士知徐州罷王洙孫抃六月復拜承㫖嘉祐元趙槩楊偉胡宿歐陽修王洙閏三月以翰林侍讀學士兼侍講學士罷孫抃王珪十二月以翰林侍讀學士起居舍人拜曽公亮四月復拜二趙槩楊偉胡宿歐陽修孫抃王珪七月丁母憂曽公亮三趙槩十月除翰林侍讀學士龍圖閣學士禮部侍郎知鄆州罷楊偉二月卒胡宿歐陽修孫抃曽公亮十二月除給事中參知政事韓絳三月以吏部員外郎知制誥拜四胡宿歐陽修孫抃韓絳三月以左諫議大夫權御史中丞罷吳奎三月以兵部員外郎知制誥拜王珪十月復拜五胡宿歐陽修十一月除樞密副使孫抃四月除樞密副使范鎮吳奎十一月除端明殿學士户部郎中知成都府罷賈黯二月以兵部員外郎知制誥拜九月除翰林侍讀學士知鄧州府罷十一月復拜蔡襄五月以樞密直學士禮部郎中拜六胡宿閏八月除左諫議大夫樞密副使王珪賈黯蔡襄范鎮吳奎六月復拜七王珪賈黯蔡襄范鎮吳奎三月除左諫議大夫樞密副使馮京十月以翰林侍讀學士右正言拜八王珪賈黯蔡襄八月遷給事中三司使罷范鎮馮京治平元王珪賈黯范鎮閏五月遷侍讀學士罷馮京王疇五月以給事中權御史中丞拜十二月除樞密副使二王珪賈黯二月以給事中權御史中丞罷馮京范鎮三月復拜三王珪馮京八月丁母憂范鎮正月除侍讀學士集賢殿修撰知陳州罷沈遘九月以龍圖閣學士右諫議大夫權知開封府拜尋丁母憂四王珪九月遷承㫖司馬光閏三月以龍圖閣直學士右諫議大夫兼侍講拜四月除權御史中丞罷九月復拜吕公著閏三月以龍圖閣直學士給事中知蔡州罷鄭獬九月以兵部員外郎知制誥拜王安石十月以工部郎中知制誥知江寧府拜翰苑羣書卷十
