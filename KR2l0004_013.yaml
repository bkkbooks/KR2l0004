body:
  text: 翰苑羣書題記翰苑秩清地禁㳂唐迄今為薦紳榮遵世蒙國恩父子兄弟接武而進實為千載幸遇曩嘗稡遺事一編朅來建鄴以家舊藏李肈元稹韋處厚韋執誼楊鉅丁居晦洎我宋數公凡有紀於此者併刋之木仍以國朝年表中興題名附乾道九年二月七日番陽洪遵書于清漪閣
